<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>减数分裂交互实验</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#f0f4f8;color:#0f172a;}
.page{max-width:1400px;margin:0 auto;padding:16px 12px 60px;}
h1{font-size:clamp(15px,3.5vw,26px);font-weight:800;margin-bottom:16px;line-height:1.3;}
/* Tabs */
.tab-nav{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:2px solid #cbd5e1;margin-bottom:16px;scrollbar-width:none;}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:10px 18px;font-size:14px;font-weight:600;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;color:#64748b;white-space:nowrap;}
.tab-btn.active{color:#0ea5e9;border-bottom-color:#0ea5e9;}
/* Tab panes */
.tab-pane{display:none;}
.tab-pane.active{display:block;}
/* Card */
.card{background:#fff;border-radius:20px;box-shadow:0 6px 24px rgba(15,23,42,.08);padding:clamp(12px,3vw,28px);}
.card-title{font-size:clamp(13px,2.8vw,18px);font-weight:700;margin-bottom:16px;}
/* Diagram scroll wrapper */
.diagram-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;scrollbar-width:thin;scrollbar-color:#94a3b8 rgba(226,232,240,.85);}
.diagram-scroll > div{display:flex;align-items:center;gap:12px;width:100%;min-width:0;}
.diagram-scroll::-webkit-scrollbar{height:10px;}
.diagram-scroll::-webkit-scrollbar-track{background:rgba(226,232,240,.85);border-radius:999px;}
.diagram-scroll::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:999px;}
/* Cell */
.cell{border:4px solid #000;border-radius:9999px;background:#fff;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;flex-shrink:0;transition:border-color .2s,box-shadow .2s;}
.cell-xl{width:180px;height:180px;}
.cell-lg{width:150px;height:150px;}
.cell-md{width:120px;height:120px;}
.cell-sm{width: 90px;height: 90px;}
.cell.drop-active{border-color:#0ea5e9!important;box-shadow:0 0 0 4px rgba(14,165,233,.2);}
.cell.correct{border-color:#22c55e!important;animation:pop .35s;}
.cell.wrong{border-color:#ef4444!important;animation:shake .35s;}
@keyframes pop{0%{transform:scale(.88)}55%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
/* Cell inner 鈥?scale content to fit */
.cell-inner{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;width:100%;height:100%;padding:8px 6px;overflow:hidden;}
/* Labels */
.cell-label{font-size:clamp(11px,1.8vw,14px);font-weight:700;text-align:center;line-height:1.3;}
/* Q-marks */
.q-mark{font-size:60px;font-weight:800;color:#0ea5e9;user-select:none;line-height:1;}
.q-mark-md{font-size:40px;font-weight:800;color:#0ea5e9;user-select:none;line-height:1;}
.q-mark-sm{font-size:26px;font-weight:800;color:#0ea5e9;user-select:none;line-height:1;}
/* Arrow */
.arr{font-size:clamp(24px,4vw,44px);color:#334155;flex-shrink:0;user-select:none;line-height:1;}
.arr-label{font-size:clamp(10px,1.8vw,13px);color:#334155;font-weight:700;text-align:center;}
/* Chromosome CSS bars */
.chromosome{display:inline-flex;align-items:center;justify-content:center;cursor:grab;user-select:none;}
.chromosome.static{cursor:default;}
.chromosome.dragging{opacity:.3;}
.chr-body{border-radius:3px;position:relative;}
.chr-body.blue{background:#1ea7d8;border:1.5px solid #0f6f94;}
.chr-body.orange{background:#f97316;border:1.5px solid #c2460b;}
.chr-body.long{width:10px;height:68px;}
.chr-body.short{width:10px;height:42px;}
.chr-body.long-sm{width:8px;height:52px;}
.chr-body.short-sm{width:8px;height:32px;}
.chr-body.long-xs{width:6px;height:38px;}
.chr-body.short-xs{width:6px;height:24px;}
.centromere{width:10px;height:10px;border-radius:50%;background:#fff;border:1.5px solid #64748b;position:absolute;left:50%;transform:translateX(-50%);}
.chr-body.long .centromere{top:28px;}
.chr-body.short .centromere{top:16px;}
.chr-body.long-sm .centromere{width:8px;height:8px;top:20px;}
.chr-body.short-sm .centromere{width:8px;height:8px;top:11px;}
.chr-body.long-xs .centromere{width:6px;height:6px;top:15px;}
.chr-body.short-xs .centromere{width:6px;height:6px;top:7px;}
/* Pool */
.pool{border:2px dashed #cbd5e1;border-radius:16px;background:#f8fafc;padding:10px 12px;display:flex;flex-wrap:wrap;gap:8px;min-height:64px;align-items:center;transition:border-color .2s;}
.pool.drop-active{border-color:#0ea5e9;background:#f0f9ff;}
.pool-slot{background:#f1f5f9;border-radius:10px;padding:6px 8px;display:flex;align-items:center;justify-content:center;}
/* Dots */
.dots{display:flex;gap:4px;}
.dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1;}
.dot.on{background:#0ea5e9;}
/* Feedback */
.feedback{display:none;margin-top:12px;padding:12px 16px;border-radius:10px;font-size:13px;line-height:1.6;}
.feedback.show{display:block;}
.feedback.success{background:#f0fdf4;border:1.5px solid #86efac;color:#166534;}
.feedback.error{background:#fef2f2;border:1.5px solid #fca5a5;color:#991b1b;}
.feedback.hint{background:#f0f9ff;border:1.5px solid #7dd3fc;color:#075985;}
/* Actions */
.actions{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;}
.btn{border-radius:14px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #cbd5e1;background:#fff;color:#0f172a;}
.btn-primary{background:#0ea5e9;color:#fff;border-color:#0ea5e9;}
/* Col helper */
.col{display:flex;flex-direction:column;align-items:center;gap:6px;}
/* Pool title */
.pool-section-title{font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px;}
.helper-note{margin-top:10px;font-size:12px;line-height:1.6;color:#475569;text-align:center;}
/* Inquiry 1 stage */
.diagram-scroll > .q1-layout{display:flex;flex-direction:column;align-items:stretch;gap:16px;min-width:0;width:100%;}
.q1-stage{
  position:relative;
  min-height:320px;
  border-radius:24px;
  border:2px dashed #cbd5e1;
  background:
    radial-gradient(circle at top right, rgba(14,165,233,.12), transparent 34%),
    linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
  overflow:hidden;
  padding:28px 28px 24px;
}
.q1-stage::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(148,163,184,.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,.12) 1px, transparent 1px);
  background-size:28px 28px;
  pointer-events:none;
}
.q1-stage-main{
  position:relative;
  z-index:1;
  min-height:240px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:28px;
}
.q1-stage-main .cell{box-shadow:0 10px 26px rgba(15,23,42,.08);}
.q1-pool-wrap{
  border:2px dashed #cbd5e1;
  border-radius:18px;
  background:#f8fafc;
  padding:14px 14px 12px;
}
.q1-picked-item{
  position:relative;
  display:inline-flex;
  align-items:flex-start;
  justify-content:flex-start;
  padding:10px 8px 0 0;
}
.q1-picked-item .chromosome{cursor:default;}
.q1-remove{
  position:absolute;
  top:0;
  right:0;
  width:20px;
  height:20px;
  border:none;
  border-radius:999px;
  background:#0f172a;
  color:#fff;
  font-size:13px;
  line-height:1;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(15,23,42,.18);
}
/* Inquiry 2 free-build stage */
.diagram-scroll > .q2-layout{display:flex;flex-direction:column;align-items:stretch;gap:16px;min-width:0;width:100%;}
.q2-stage{position:relative;min-height:500px;border-radius:24px;border:2px dashed #cbd5e1;background:
  radial-gradient(circle at top right, rgba(14,165,233,.12), transparent 34%),
  linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
  overflow:hidden;
}
.q2-stage::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(148,163,184,.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,.12) 1px, transparent 1px);
  background-size:28px 28px;
  pointer-events:none;
}
.q2-stage.is-drop-target{box-shadow:inset 0 0 0 4px rgba(14,165,233,.22);}
.q2-origin-card{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  width:176px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  z-index:1;
}
.q2-origin-cell{
  width:152px;
  height:152px;
  box-shadow:0 10px 26px rgba(15,23,42,.08);
}
.q2-stage-layer{position:absolute;inset:0;z-index:2;}
.q2-palette-wrap{
  border:2px dashed #cbd5e1;
  border-radius:18px;
  background:#f8fafc;
  padding:14px 14px 12px;
}
.q2-palette-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(110px, 1fr));
  gap:10px;
}
.q2-palette-item{
  border:none;
  border-radius:16px;
  background:#fff;
  box-shadow:0 4px 14px rgba(15,23,42,.06);
  padding:10px 8px 8px;
  min-height:108px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  cursor:grab;
  touch-action:none;
  user-select:none;
}
.q2-palette-item:hover{background:#f0f9ff;box-shadow:0 8px 18px rgba(14,165,233,.14);}
.q2-palette-item:active{cursor:grabbing;}
.q2-stage-item{
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:grab;
  touch-action:none;
  user-select:none;
}
.q2-stage-item:active{cursor:grabbing;}
.q2-stage-remove{
  position:absolute;
  top:-2px;
  right:-2px;
  width:9px;
  height:9px;
  border:none;
  border-radius:999px;
  background:#0f172a;
  color:#fff;
  font-size:6px;
  line-height:1;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 2px 4px rgba(15,23,42,.16);
}
.q2-piece{display:flex;align-items:center;justify-content:center;width:100%;height:100%;pointer-events:none;}
.q2-piece-cell{
  width:76px;
  height:76px;
  border:3px solid #111827;
  border-radius:50%;
  background:#fff;
}
.q2-piece-arrow{
  font-size:34px;
  font-weight:700;
  color:#111827;
  line-height:1;
}
.q2-piece-palette .q2-piece-cell{width:60px;height:60px;border-width:3px;}
.q2-piece-palette .q2-piece-arrow{font-size:28px;}
.q2-drag-ghost{
  position:fixed;
  left:0;
  top:0;
  pointer-events:none;
  z-index:9999;
  opacity:.88;
  filter:drop-shadow(0 10px 18px rgba(15,23,42,.18));
}
.q2-flow-wrap{
  border:2px dashed #cbd5e1;
  border-radius:22px;
  padding:14px;
  background:#fff;
}
.q2-flow-fit{
  position:relative;
  width:100%;
  max-width:1320px;
  height:580px;
  margin:0 auto;
}
.q2-flow-fit > .q2-flow-stage{
  position:absolute;
  left:0;
  top:0;
}
.q2-flow-stage{
  position:relative;
  width:1320px;
  height:580px;
  border-radius:24px;
  background:#fff;
  overflow:hidden;
  transform-origin:top left;
}
.q2-flow-stage::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(148,163,184,.10) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,.10) 1px, transparent 1px);
  background-size:24px 24px;
  pointer-events:none;
}
.q2-flow-svg,
.q2-flow-annos,
.q2-flow-layer{
  position:absolute;
  inset:0;
}
.q2-flow-svg{z-index:1;}
.q2-flow-annos{
  pointer-events:none;
  z-index:2;
}
.q2-flow-layer{z-index:3;}
.q2-palette-wrap{
  border:2px dashed #cbd5e1;
  border-radius:22px;
  padding:14px;
  background:
    radial-gradient(circle at top right, rgba(14,165,233,.12), transparent 34%),
    linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
}
.q2-palette-wrap .diagram-scroll{
  overflow-x:auto;
  overflow-y:hidden;
  padding-bottom:8px;
  touch-action:pan-x pan-y;
}
.q2-pool{
  display:grid;
  grid-auto-flow:column;
  grid-auto-columns:max-content;
  gap:14px;
  min-width:max-content;
  align-items:end;
  justify-content:flex-start;
  padding:8px 4px 8px 2px;
}
.q2-pool-item{
  display:flex;
  align-items:center;
  justify-content:center;
  min-width:22px;
  min-height:92px;
  line-height:0;
  border:none;
  background:none;
  padding:0;
  cursor:grab;
  user-select:none;
  touch-action:manipulation;
}
.q2-pool-item.dragging{opacity:.35;}
.q2-pool-item.q3-touch-dragging .q3-visual{
  transform:scale(var(--q3-touch-drag-scale, 1));
  transform-origin:center center;
}
/* Inquiry 3 full-flow matching mode */
.q3-layout{display:flex;flex-direction:column;gap:18px;}
.q3-flow-wrap,
.q3-palette-wrap{
  border:2px dashed #cbd5e1;
  border-radius:22px;
  padding:14px;
}
.q3-flow-wrap{background:#fff;}
.q3-palette-wrap{
  background:
    radial-gradient(circle at top right, rgba(14,165,233,.12), transparent 34%),
    linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
}
.q3-palette-wrap .diagram-scroll{
  overflow-x:auto;
  overflow-y:hidden;
  padding-bottom:12px;
  touch-action:pan-x pan-y;
}
.q3-stage-fit{
  position:relative;
  width:100%;
  max-width:1320px;
  height:580px;
  margin:0 auto;
}
.q3-stage-fit > .q3-stage{
  position:absolute;
  left:0;
  top:0;
}
.q3-stage{
  position:relative;
  width:1320px;
  height:580px;
  border-radius:24px;
  background:#fff;
  overflow:hidden;
  transform-origin:top left;
}
.q3-stage::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(148,163,184,.10) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,.10) 1px, transparent 1px);
  background-size:24px 24px;
  pointer-events:none;
}
.q3-stage-svg,
.q3-stage-annos,
.q3-stage-layer{
  position:absolute;
  inset:0;
}
.q3-stage-svg{z-index:1;}
.q3-stage-annos{
  pointer-events:none;
  z-index:2;
}
.q3-stage-layer{z-index:3;}
.q3-stage-slot{
  position:absolute;
  --q3-slot-stroke:#111827;
  border:3px solid var(--q3-slot-stroke);
  border-radius:50%;
  background:rgba(255,255,255,.96);
  box-sizing:border-box;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  box-shadow:none;
  transition:border-color .2s, box-shadow .2s, transform .2s, background .2s;
}
.q3-stage-slot.can-drop{
  --q3-slot-stroke:#111827;
  box-shadow:none;
  transform:none;
}
.q3-stage-slot.filled{background:rgba(255,255,255,.985);}
.q3-stage-slot.correct{
  --q3-slot-stroke:#22c55e;
  box-shadow:0 0 0 4px rgba(34,197,94,.16);
}
.q3-stage-slot.wrong{
  --q3-slot-stroke:#ef4444;
  box-shadow:0 0 0 4px rgba(239,68,68,.14);
}
.q3-stage-slot.q3-stage-slot-gourd{
  border:none;
  border-radius:0;
  background:transparent;
  box-shadow:none;
}
.q3-slot-shape{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:0;
}
.q3-slot-shape svg{
  display:block;
  width:100%;
  height:100%;
}
.q3-slot-shape path{
  fill:rgba(255,255,255,.985);
  stroke:var(--q3-slot-stroke);
  stroke-width:3;
  vector-effect:non-scaling-stroke;
}
.q3-stage-slot.q3-stage-slot-gourd.correct .q3-slot-shape{
  filter:drop-shadow(0 0 0 rgba(34,197,94,.16)) drop-shadow(0 0 4px rgba(34,197,94,.28));
}
.q3-stage-slot.q3-stage-slot-gourd.wrong .q3-slot-shape{
  filter:drop-shadow(0 0 0 rgba(239,68,68,.14)) drop-shadow(0 0 4px rgba(239,68,68,.24));
}
.q3-slot-tip,
.q3-palette-note{
  margin-top:10px;
  font-size:12px;
  line-height:1.6;
  color:#475569;
}
.q3-palette-note{display:none;}
.q3-pool{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(96px, 1fr));
  gap:14px 12px;
  min-width:0;
  align-items:end;
  justify-items:center;
}
.q3-pool-item{
  border:none;
  background:none;
  padding:0;
  cursor:grab;
  user-select:none;
  touch-action:manipulation;
}
.q3-pool-item.dragging{opacity:.35;}
.q3-pool-item.q3-touch-dragging .q3-visual{
  transform:scale(var(--q3-touch-drag-scale, 1));
  transform-origin:center center;
}
.q4-pool{
  display:grid;
  grid-auto-flow:column;
  grid-auto-columns:max-content;
  gap:10px;
  min-width:max-content;
  align-items:center;
  justify-content:flex-start;
  padding:10px 6px 10px 2px;
}
.q4-pool-item{
  display:flex;
  align-items:center;
  justify-content:center;
  min-width:24px;
  min-height:86px;
  line-height:0;
  border:none;
  background:none;
  padding:0;
  cursor:grab;
  user-select:none;
  touch-action:manipulation;
}
.q4-pool-item.dragging{opacity:.35;}
.q4-pool-item.q3-touch-dragging .q3-visual{
  transform:scale(var(--q3-touch-drag-scale, 1));
  transform-origin:center center;
}
.prep-pool-item{
  cursor:grab;
}
.q3-visual{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:0;
}
.q3-visual-artboard{
  position:relative;
  width:100px;
  height:100px;
  transform-origin:top left;
  pointer-events:none;
}
.q3-visual-disc{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:#fff;
  border:2.5px solid #111827;
  box-sizing:border-box;
}
.q3-visual-stage .q3-visual-disc{
  background:transparent;
  border:none;
}
.q3-visual-chr{
  position:absolute;
  transform-origin:center center;
}
.q3-stage-slot.preset{
  background:rgba(255,255,255,.99);
}
.q3-stage-remove{
  position:absolute;
  top:-1px;
  right:-1px;
  width:9px;
  height:9px;
  border:none;
  border-radius:999px;
  background:#0f172a;
  color:#fff;
  font-size:6px;
  line-height:1;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 2px 4px rgba(15,23,42,.14);
  z-index:3;
}
.q3-stage-item{
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:grab;
  touch-action:none;
  user-select:none;
}
.q3-stage-item:active{cursor:grabbing;}
.q3-stage-item .q3-visual{pointer-events:none;}
.q3-stage-item .q3-stage-remove{pointer-events:auto;}
.q3-stage-item.locked{
  cursor:default;
  touch-action:auto;
}
.q3-visual-frame{
  position:relative;
  flex:none;
  width:120px;
  height:120px;
  transform-origin:center center;
  pointer-events:none;
}
.q3-visual-svg{
  display:block;
  pointer-events:none;
}
.q3-visual-pool .q3-visual-img{
  width:100%;
  height:100%;
}
.q3-visual-stage .q3-visual-img{
  width:138%;
  height:138%;
}
.q3-visual-img{
  display:block;
  object-fit:contain;
  pointer-events:none;
}
.q3-visual-pool.q3-visual-sperm .q3-visual-img{
  width:128%;
  height:128%;
  transform:translateX(-3%);
}

<script>

// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════
const BASE = [
  { id:'L1', pair:1, size:'long',  color:'blue'   },
  { id:'L2', pair:1, size:'long',  color:'blue'   },
  { id:'S1', pair:2, size:'short', color:'blue'   },
  { id:'S2', pair:2, size:'short', color:'blue'   },
];

const REPS = [
  { id:'L1a', pair:1, size:'long',  color:'blue',   sister:'L1' },
  { id:'L1b', pair:1, size:'long',  color:'blue',   sister:'L1' },
  { id:'L2a', pair:1, size:'long',  color:'blue',   sister:'L2' },
  { id:'L2b', pair:1, size:'long',  color:'blue',   sister:'L2' },
  { id:'S1a', pair:2, size:'short', color:'orange', sister:'S1' },
  { id:'S1b', pair:2, size:'short', color:'orange', sister:'S1' },
  { id:'S2a', pair:2, size:'short', color:'orange', sister:'S2' },
  { id:'S2b', pair:2, size:'short', color:'orange', sister:'S2' },
];

// ── helpers ──
function chr(data, small, draggable=true) {
  const el = document.createElement('div');
  el.className = 'chromosome' + (draggable ? '' : ' static');
  el.draggable = draggable;
  el.dataset.id = data.id;
  const sizeKey = small
    ? (data.size==='long' ? 'long-sm' : 'short-sm')
    : data.size;
  const body = document.createElement('div');
  body.className = `chr-body ${sizeKey} ${data.color}`;
  const cm = document.createElement('div');
  cm.className = 'centromere';
  body.appendChild(cm);
  el.appendChild(body);
  if (draggable) {
    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', data.id);
      el.classList.add('dragging');
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
  }
  return el;
}

function chrXS(data, draggable=true) {
  const el = document.createElement('div');
  el.className = 'chromosome' + (draggable ? '' : ' static');
  el.draggable = draggable;
  el.dataset.id = data.id;
  const sizeKey = data.size==='long' ? 'long-xs' : 'short-xs';
  const body = document.createElement('div');
  body.className = `chr-body ${sizeKey} ${data.color}`;
  const cm = document.createElement('div');
  cm.className = 'centromere';
  body.appendChild(cm);
  el.appendChild(body);
  if (draggable) {
    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', data.id);
      el.classList.add('dragging');
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
  }
  return el;
}

function setFB(id, msg, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `feedback ${type} show`;
  el.innerHTML = msg;
}
function clrFB(id) {
  const el = document.getElementById(id);
  if (el) el.className = 'feedback';
}
function popCorrect(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('correct');
  setTimeout(() => el.classList.remove('correct'), 650);
}
function popWrong(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('wrong');
  setTimeout(() => el.classList.remove('wrong'), 450);
}

function makeDots(containerId, total, filled) {
  const c = document.getElementById(containerId);
  if (!c) return;
  c.innerHTML = '';
  for (let i=0;i<total;i++){
    const d = document.createElement('div');
    d.className = 'dot' + (i<filled?' on':'');
    c.appendChild(d);
  }
}

function makePool(pool, chrs, placed, small, onDrop) {
  pool.innerHTML = '';
  chrs.filter(c => !placed.includes(c.id)).forEach(c => {
    const s = document.createElement('div');
    s.className = 'pool-slot';
    s.appendChild(small ? chr(c, true) : chr(c, false));
    pool.appendChild(s);
  });
  pool.addEventListener('dragover', e => e.preventDefault());
  pool.addEventListener('drop', e => {
    e.preventDefault();
    onDrop(e.dataTransfer.getData('text/plain'));
  });
}

function makeDropCell(cellId, onDrop) {
  const el = document.getElementById(cellId);
  if (!el) return;
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drop-active'); });
  el.addEventListener('dragleave', () => el.classList.remove('drop-active'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drop-active');
    onDrop(e.dataTransfer.getData('text/plain'));
  });
}

function renderInner(innerId, placed, allChrs, qMark, small) {
  const inner = document.getElementById(innerId);
  if (!inner) return;
  inner.innerHTML = '';
  if (placed.length === 0) {
    const q = document.createElement('div');
    q.className = qMark || 'q-mark';
    q.textContent = '?';
    inner.appendChild(q);
  } else {
    placed.forEach(id => {
      const c = allChrs.find(x => x.id===id);
      if (c) inner.appendChild(small ? chr(c, true) : chr(c, false));
    });
  }
}

// ═══════════════════════════════════════════════════
// PRE-CLASS PREP
// ═══════════════════════════════════════════════════
const QPREP_STAGE_SIZE = { width:1320, height:430 };
const QPREP_SLOT_DIM = { sm:104, md:122, lg:136 };
const QPREP_STAGE_SLOTS = [
  { id:'s0', x:18,   y:94, size:'sm', preset:'origin' },
  { id:'s1', x:180,  y:78, size:'lg', preset:'interphase' },
  { id:'s2', x:398,  y:78, size:'lg', preset:'prophase' },
  { id:'s3', x:620,  y:88, size:'md', preset:null },
  { id:'s4', x:818,  y:68, w:150, h:162, frame:'gourd', preset:null },
  { id:'s5', x:994,  y:68, w:150, h:162, frame:'gourd', preset:'telophase' },
  { id:'s6', x:1202, y:34, size:'sm', preset:'daughter' },
  { id:'s7', x:1202, y:190, size:'sm', preset:'daughter' },
];
const QPREP_STAGE_LINKS = [
  { d:'M 122 146 L 180 146' },
  { d:'M 316 146 L 398 146' },
  { d:'M 534 146 L 620 146' },
  { d:'M 742 149 L 818 149' },
  { d:'M 968 149 L 994 149' },
  { d:'M 1144 149 L 1178 149 L 1178 86 L 1202 86' },
  { d:'M 1144 149 L 1178 149 L 1178 242 L 1202 242' },
];

let qPrepBuilt = false;
let qPrepScaleBound = false;
let qPrepPlacements = {};
let qPrepDragCandidateId = null;
let qPrepStageNextId = 1;
let qPrepStageZCounter = 1;
let qPrepStageDragState = null;
const QPREP_ASSETS = {
  origin: './images/prep-origin.webp',
  interphase: './images/prep-interphase.webp',
  telophase: './images/prep-telophase.webp',
};
const QPREP_POOL_ITEMS = [
  { id:'prep-x-s-1', shape:'x', size:'short', poolDim:62 },
  { id:'prep-x-l-1', shape:'x', size:'long',  poolDim:92 },
  { id:'prep-x-l-2', shape:'x', size:'long',  poolDim:92 },
  { id:'prep-x-s-2', shape:'x', size:'short', poolDim:62 },
  { id:'prep-open-dl-1', shape:'open', variant:'large', direction:'down', poolDim:106 },
  { id:'prep-open-dl-2', shape:'open', variant:'large', direction:'down', poolDim:106 },
  { id:'prep-open-ds-1', shape:'open', variant:'small', direction:'down', poolDim:72 },
  { id:'prep-open-ds-2', shape:'open', variant:'small', direction:'down', poolDim:72 },
  { id:'prep-open-ul-1', shape:'open', variant:'large', direction:'up',   poolDim:106 },
  { id:'prep-open-ul-2', shape:'open', variant:'large', direction:'up',   poolDim:106 },
  { id:'prep-open-us-1', shape:'open', variant:'small', direction:'up',   poolDim:72 },
  { id:'prep-open-us-2', shape:'open', variant:'small', direction:'up',   poolDim:72 },
];

function qPrepDim(size) {
  return QPREP_SLOT_DIM[size] || QPREP_SLOT_DIM.md;
}

function qPrepPoolDisplayScale() {
  const vw = q3ViewportWidth();
  if (vw <= 480) return 0.70;
  if (vw <= 768) return 0.82;
  if (vw <= 1024) return 0.92;
  return 1;
}

function qPrepPoolItemDim(item) {
  return Math.max(36, Math.round(item.poolDim * qPrepPoolDisplayScale()));
}

function qPrepTouchDragScale() {
  const vw = q3ViewportWidth();
  if (vw <= 480) return 0.34;
  if (vw <= 768) return 0.42;
  if (vw <= 1024) return 0.56;
  return 1;
}

function qPrepStageViewportScale() {
  const vw = q3ViewportWidth();
  if (vw <= 480) return 0.92;
  if (vw <= 768) return 0.96;
  if (vw <= 1024) return 0.99;
  return 1;
}

function qPrepPoolNaturalBox(item) {
  if (item.shape === 'x') {
    return item.size === 'long'
      ? { width: 28, height: 60 }
      : { width: 24, height: 42 };
  }
  return item.variant === 'large'
    ? { width: 106, height: 54 }
    : { width: 70, height: 36 };
}

function qPrepPoolSvg(item) {
  if (item.shape === 'x') {
    return q4ChrXSVG({ size:item.size, col:'blue' }, 'sm');
  }
  return q3PoolOpenChromSVG(item.variant, 'blue', item.direction);
}

function qPrepCreateCandidateVisual(item, dim, mode='pool') {
  const natural = qPrepPoolNaturalBox(item);
  const available = mode === 'stage' ? Math.max(16, dim - 4) : dim;
  const scale = Math.min(available / natural.width, available / natural.height);
  const boxWidth = mode === 'stage' ? dim : Math.max(18, Math.round(natural.width * scale));
  const boxHeight = mode === 'stage' ? dim : Math.max(18, Math.round(natural.height * scale));

  const outer = document.createElement('div');
  outer.className = 'q3-visual q3-visual-' + mode;
  outer.style.width = boxWidth + 'px';
  outer.style.height = boxHeight + 'px';

  const artboard = document.createElement('div');
  artboard.className = 'q3-visual-artboard';
  artboard.style.width = boxWidth + 'px';
  artboard.style.height = boxHeight + 'px';
  artboard.style.transform = 'none';

  const holder = document.createElement('div');
  holder.className = 'q3-visual-chr';
  holder.style.left = '50%';
  holder.style.top = '50%';
  holder.style.transform = `translate(-50%, -50%) scale(${scale})`;

  const svg = qPrepPoolSvg(item);
  svg.style.display = 'block';
  holder.appendChild(svg);
  artboard.appendChild(holder);
  outer.appendChild(artboard);
  return outer;
}

function qPrepCandidateById(id) {
  return QPREP_POOL_ITEMS.find(item => item.id === id);
}

function qPrepInitialPlacements() {
  return QPREP_STAGE_SLOTS.reduce((acc, slot) => {
    if (!slot.preset) acc[slot.id] = [];
    return acc;
  }, {});
}

function qPrepSlotById(id) {
  return QPREP_STAGE_SLOTS.find(slot => slot.id === id);
}

function qPrepGetSlotItems(slotId) {
  if (!Array.isArray(qPrepPlacements[slotId])) qPrepPlacements[slotId] = [];
  return qPrepPlacements[slotId];
}

function qPrepFindStageItem(slotId, itemId) {
  return qPrepGetSlotItems(slotId).find(item => item.id === itemId);
}

function qPrepCollectUsedCandidateIds() {
  return Object.values(qPrepPlacements).flat().map(item => item.candidateId);
}

function qPrepCanAccept(slot, candidate) {
  return !!(slot && candidate && !slot.preset);
}

function qPrepClearDropHighlights() {
  QPREP_STAGE_SLOTS.forEach(slot => {
    const el = document.getElementById('prep-slot-' + slot.id);
    if (el) el.classList.remove('can-drop');
  });
}

function qPrepStageScaleFactor(count) {
  if (count <= 1) return 0.84;
  if (count === 2) return 0.74;
  if (count <= 4) return 0.66;
  if (count <= 6) return 0.52;
  return 0.42;
}

function qPrepAutoCenters(slot, count) {
  if (!(slot && slot.frame === 'gourd')) return q3AutoCenters(count);

  if (count <= 1) return [{ x:0.50, y:0.28 }];
  if (count === 2) return [{ x:0.36, y:0.28 }, { x:0.64, y:0.72 }];
  if (count === 3) return [{ x:0.28, y:0.28 }, { x:0.50, y:0.28 }, { x:0.72, y:0.72 }];
  if (count === 4) return [
    { x:0.34, y:0.28 }, { x:0.66, y:0.28 },
    { x:0.34, y:0.72 }, { x:0.66, y:0.72 },
  ];
  if (count === 5) return [
    { x:0.24, y:0.28 }, { x:0.50, y:0.28 }, { x:0.76, y:0.28 },
    { x:0.38, y:0.72 }, { x:0.62, y:0.72 },
  ];
  if (count === 6) return [
    { x:0.24, y:0.28 }, { x:0.50, y:0.28 }, { x:0.76, y:0.28 },
    { x:0.24, y:0.72 }, { x:0.50, y:0.72 }, { x:0.76, y:0.72 },
  ];
  if (count === 7) return [
    { x:0.18, y:0.28 }, { x:0.40, y:0.28 }, { x:0.60, y:0.28 }, { x:0.82, y:0.28 },
    { x:0.24, y:0.72 }, { x:0.50, y:0.72 }, { x:0.76, y:0.72 },
  ];
  return [
    { x:0.18, y:0.28 }, { x:0.40, y:0.28 }, { x:0.60, y:0.28 }, { x:0.82, y:0.28 },
    { x:0.18, y:0.72 }, { x:0.40, y:0.72 }, { x:0.60, y:0.72 }, { x:0.82, y:0.72 },
  ];
}

function qPrepPlacedItemDim(candidate, slotDim, count, slot=null) {
  if (slot && slot.frame === 'gourd') {
    const natural = qPrepPoolNaturalBox(candidate);
    const contentBase = Math.max(natural.width, natural.height);
    const largePenalty = (candidate.variant === 'large' || candidate.size === 'long') ? 0.92 : 1;
    const shapePenalty = candidate.shape === 'open' ? 0.98 : 1;
    const slotBase = Math.min(slotDim.width || slotDim.w || 150, slotDim.height || slotDim.h || 162);
    const deviceScale = qPrepStageViewportScale();
    const gourdBoost = 1.18;
    const maxDim = Math.round(
      slotBase * (count <= 1 ? 0.56 : count === 2 ? 0.48 : count <= 4 ? 0.42 : count <= 6 ? 0.36 : 0.32) * gourdBoost * deviceScale
    );
    const scaled = Math.round(
      contentBase * (count <= 1 ? 1.04 : count === 2 ? 0.86 : count <= 4 ? 0.72 : count <= 6 ? 0.58 : 0.48) * gourdBoost * largePenalty * shapePenalty * deviceScale
    );
    return Math.max(10, Math.min(maxDim, scaled));
  }

  const slotBase = typeof slotDim === 'number'
    ? slotDim
    : Math.min(slotDim.width || slotDim.w || 74, slotDim.height || slotDim.h || 74);
  const deviceScale = qPrepStageViewportScale();
  const maxDim = Math.round(
    slotBase * (count <= 1 ? 0.90 : count === 2 ? 0.80 : count <= 4 ? 0.70 : 0.58) * deviceScale
  );
  const scaled = Math.round(candidate.poolDim * qPrepStageScaleFactor(count) * deviceScale);
  return Math.max(16, Math.min(maxDim, scaled));
}

function qPrepStageContentBox(candidate, dim) {
  const natural = qPrepPoolNaturalBox(candidate);
  const available = Math.max(16, dim - 4);
  const scale = Math.min(available / natural.width, available / natural.height);
  return {
    width: Math.max(12, Math.round(natural.width * scale)),
    height: Math.max(12, Math.round(natural.height * scale)),
  };
}

function qPrepRenderPool() {
  const pool = document.getElementById('prep-pool');
  if (!pool) return;
  pool.innerHTML = '';

  const used = new Set(qPrepCollectUsedCandidateIds());
  QPREP_POOL_ITEMS.filter(item => !used.has(item.id)).forEach(item => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'q4-pool-item prep-pool-item';
    btn.draggable = true;
    btn.dataset.id = item.id;
    btn.tabIndex = -1;
    btn.appendChild(qPrepCreateCandidateVisual(item, qPrepPoolItemDim(item), 'pool'));

    btn.addEventListener('dragstart', e => {
      qPrepDragCandidateId = item.id;
      e.dataTransfer.setData('text/plain', item.id);
      setTimeout(() => btn.classList.add('dragging'), 0);
    });
    btn.addEventListener('dragend', () => {
      btn.classList.remove('dragging');
      qPrepDragCandidateId = null;
      qPrepClearDropHighlights();
    });

    pool.appendChild(btn);
  });
}

function qPrepChromatinStrandSVG(width, height, bend=5, stroke='#7aa9ef', strokeWidth=3.2) {
  const svg = makeSVG(width, height);
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  const cx = width / 2;
  const top = 4;
  const bottom = height - 4;
  const y1 = height * 0.24;
  const y2 = height * 0.5;
  const y3 = height * 0.76;
  path.setAttribute('d', `M ${cx} ${top} C ${cx - bend} ${y1}, ${cx + bend} ${y1 + height*0.10}, ${cx} ${y2} C ${cx - bend} ${y3 - height*0.10}, ${cx + bend} ${y3}, ${cx} ${bottom}`);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', stroke);
  path.setAttribute('stroke-width', strokeWidth);
  path.setAttribute('stroke-linecap', 'round');
  path.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(path);
  return svg;
}

function qPrepAddStrands(board, strands) {
  strands.forEach(item => {
    const strand = qPrepChromatinStrandSVG(item.w, item.h, item.bend, item.stroke, item.sw);

}

function qPrepAddCluster(board, cx, cy, scale=1) {

function qPrepBarSVG(kind='long', centerFill='#111827') {
  const isLong = kind === 'long';
  const h = isLong ? 58 : 34;
  const w = isLong ? 12 : 10;
  const r = isLong ? 4.2 : 3.6;
  const s = makeSVG(w, h);
  s.appendChild(svgRect(1, 1, w - 2, h - 2, 3, '#1ea7d8', '#0f6f94', 1.5));
  s.appendChild(svgCircle(w / 2, h * 0.42, r, centerFill, '#0f172a', 1.1));
  return s;
}

function qPrepXSVG(kind='long') {
  const isLong = kind === 'long';
  const arm = isLong ? 28 : 18;
  const sp = isLong ? 8 : 5.5;
  const thick = isLong ? 6.2 : 4.8;
  const W = sp * 2 + 16;
  const H = arm * 2 + 10;
  const cx = W / 2;
  const cy = H / 2;
  const s = makeSVG(W, H);
  [[cx,cy,cx-sp,cy-arm],[cx,cy,cx+sp,cy-arm],[cx,cy,cx-sp,cy+arm],[cx,cy,cx+sp,cy+arm]]
    .forEach(([x1,y1,x2,y2]) => {
      s.appendChild(svgLine(x1, y1, x2, y2, thick + 2, '#0f6f94'));
      s.appendChild(svgLine(x1, y1, x2, y2, thick, '#1ea7d8'));
    });
  s.appendChild(svgCircle(cx, cy, isLong ? 4.8 : 4, '#1ea7d8', '#0f6f94', 1.1));
  return s;
}

  if (kind === 'daughter') return qPrepImageVisual(QPREP_ASSETS.origin, width, height, 0.84);

    qPrepPlaceNode(board, q4ChrXSVG({ size:'long',  col:'blue' }, 'sm'), Math.round(width * 0.17), Math.round(height * 0.14), -18);

function qPrepRenderStage() {
  const layer = document.getElementById('prep-stage-layer');
  const stage = document.getElementById('prep-stage');
  if (!(layer && stage)) return;

  stage.style.width = QPREP_STAGE_SIZE.width + 'px';
  stage.style.height = QPREP_STAGE_SIZE.height + 'px';
  layer.innerHTML = '';

  QPREP_STAGE_SLOTS.forEach(slot => {
    const dim = qPrepDim(slot.size);
    const slotWidth = slot.w || dim;
    const slotHeight = slot.h || dim;
    const el = document.createElement('div');
    el.id = 'prep-slot-' + slot.id;
    el.className = 'q3-stage-slot';
    if (slot.frame === 'gourd') el.classList.add('q3-stage-slot-gourd');
    el.style.left = slot.x + 'px';
    el.style.top = slot.y + 'px';
    el.style.width = slotWidth + 'px';
    el.style.height = slotHeight + 'px';
    el.dataset.droppable = 'true';

    if (slot.frame === 'gourd') {
      el.appendChild(q3CreateGourdSlotShape());
    }

    if (slot.preset) {
      el.classList.add('filled', 'preset');
      const preview = qPrepCreateVisual(slot.preset, { width:slotWidth, height:slotHeight });
      preview.style.position = 'absolute';
      preview.style.left = '50%';
      preview.style.top = '50%';
      preview.style.transform = 'translate(-50%, -50%)';
      preview.style.pointerEvents = 'none';
      preview.style.zIndex = '1';
      el.appendChild(preview);
    } else {
      const items = qPrepGetSlotItems(slot.id)
        .slice()
        .sort((a, b) => a.z - b.z);
      if (items.length) el.classList.add('filled');

      const autoCenters = qPrepAutoCenters(slot, items.length);
      let autoIndex = 0;
      items.forEach(item => {
        const candidate = qPrepCandidateById(item.candidateId);
        if (!candidate) return;

        const itemDim = qPrepPlacedItemDim(candidate, { width:slotWidth, height:slotHeight }, items.length, slot);
        const autoPos = autoCenters[autoIndex] || { x:.5, y:.5 };
        const pos = q3ResolveStageItemPos(item, itemDim, { width:slotWidth, height:slotHeight }, autoPos);
        if (!item.manual) autoIndex += 1;

        const piece = document.createElement('div');
        piece.className = 'q3-stage-item';
        piece.dataset.slotId = slot.id;
        piece.dataset.itemId = item.id;
        piece.style.width = itemDim + 'px';
        piece.style.height = itemDim + 'px';
        piece.style.left = pos.left + 'px';
        piece.style.top = pos.top + 'px';
        piece.style.zIndex = item.z;

        const visual = qPrepCreateCandidateVisual(candidate, itemDim, 'stage');
        visual.style.pointerEvents = 'none';
        piece.appendChild(visual);

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'q3-stage-remove';
        removeBtn.textContent = '×';
        {
          const inset = qStageRemoveInsets(itemDim, qPrepStageContentBox(candidate, itemDim));
          removeBtn.style.right = inset.right + 'px';
          removeBtn.style.top = inset.top + 'px';
        }
        removeBtn.addEventListener('pointerdown', e => e.stopPropagation());
        removeBtn.addEventListener('click', e => {
          e.preventDefault();
          e.stopPropagation();
          qPrepReturnToPool(slot.id, item.id);
        });
        piece.appendChild(removeBtn);

        piece.addEventListener('pointerdown', e => qPrepStartMoveItem(e, slot.id, item.id, piece));
        el.appendChild(piece);
      });
    }

    el.ondragover = e => {
      if (!qPrepCanAccept(slot, qPrepCandidateById(qPrepDragCandidateId))) return;
      e.preventDefault();
      el.classList.add('can-drop');
    };
    el.ondragleave = () => el.classList.remove('can-drop');
    el.ondrop = e => {
      e.preventDefault();
      el.classList.remove('can-drop');
      qPrepHandleDrop(slot.id, e.dataTransfer.getData('text/plain'), e);
    };

    layer.appendChild(el);
  });
}

function qPrepFitStage() {
  const shell = document.getElementById('prep-stage-fit');
  const stage = document.getElementById('prep-stage');
  if (!(shell && stage)) return;

  const parent = shell.parentElement;
  const availableWidth = parent ? parent.clientWidth : shell.clientWidth;
  const scale = availableWidth ? Math.min(1, availableWidth / QPREP_STAGE_SIZE.width) : 1;

  shell.style.height = (QPREP_STAGE_SIZE.height * scale) + 'px';
  stage.style.width = QPREP_STAGE_SIZE.width + 'px';
  stage.style.height = QPREP_STAGE_SIZE.height + 'px';
  stage.style.transform = `scale(${scale})`;
}

function qPrepHandleResize() {
  qPrepFitStage();
  qPrepRenderStage();
  qPrepRenderPool();
}

function qPrepReturnToPool(slotId, itemId) {
  if (!slotId || !itemId) return;
  qPrepPlacements[slotId] = qPrepGetSlotItems(slotId).filter(item => item.id !== itemId);
  qPrepRenderPool();
  qPrepRenderStage();
}

function qPrepFreezeSlotItems(slotId, slot=null) {
  const targetSlot = slot || qPrepSlotById(slotId);
  const items = qPrepGetSlotItems(slotId);
  if (!(targetSlot && items.length)) return;

  const slotWidth = targetSlot.w || qPrepDim(targetSlot.size);
  const slotHeight = targetSlot.h || qPrepDim(targetSlot.size);
  const autoCenters = qPrepAutoCenters(targetSlot, items.length);
  let autoIndex = 0;

  items.forEach(item => {
    if (item.manual) return;
    const candidate = qPrepCandidateById(item.candidateId);
    if (!candidate) return;
    const itemDim = qPrepPlacedItemDim(candidate, { width:slotWidth, height:slotHeight }, items.length, targetSlot);
    const autoPos = autoCenters[autoIndex] || { x:.5, y:.5 };
    const pos = q3ResolveStageItemPos(item, itemDim, { width:slotWidth, height:slotHeight }, autoPos);
    item.x = pos.x;
    item.y = pos.y;
    item.manual = true;
    autoIndex += 1;
  });
}

function qPrepDropCenterFromEvent(slotId, candidate, event) {
  const slot = qPrepSlotById(slotId);
  const slotEl = document.getElementById('prep-slot-' + slotId);
  if (!(slot && slotEl && event && Number.isFinite(event.clientX) && Number.isFinite(event.clientY))) {
    return { x:.5, y:.5 };
  }

  const currentCount = qPrepGetSlotItems(slotId).length + 1;
  const slotWidth = slot.w || qPrepDim(slot.size);
  const slotHeight = slot.h || qPrepDim(slot.size);
  const itemDim = qPrepPlacedItemDim(candidate, { width:slotWidth, height:slotHeight }, currentCount, slot);
  const rect = slotEl.getBoundingClientRect();
  if (!rect.width || !rect.height) return { x:.5, y:.5 };

  const rawX = (event.clientX - rect.left) / rect.width;
  const rawY = (event.clientY - rect.top) / rect.height;
  const minX = itemDim / (slotWidth * 2);
  const maxX = 1 - minX;
  const minY = itemDim / (slotHeight * 2);
  const maxY = 1 - minY;
  return {
    x: q3Clamp(rawX, minX, maxX),
    y: q3Clamp(rawY, minY, maxY),
  };
}

function qPrepHandleDrop(slotId, candidateId, event=null) {
  const slot = qPrepSlotById(slotId);
  const candidate = qPrepCandidateById(candidateId);
  if (!qPrepCanAccept(slot, candidate)) return;

  const used = new Set(qPrepCollectUsedCandidateIds());
  if (used.has(candidateId)) return;

  qPrepFreezeSlotItems(slotId, slot);
  const dropPos = qPrepDropCenterFromEvent(slotId, candidate, event);

  qPrepGetSlotItems(slotId).push({
    id: 'prep-stage-item-' + qPrepStageNextId++,
    candidateId,
    x: dropPos.x,
    y: dropPos.y,
    manual: true,
    z: ++qPrepStageZCounter,
  });
  qPrepRenderPool();
  qPrepRenderStage();
}

function qPrepFinishStageMove() {
  qPrepStageDragState = null;
  document.removeEventListener('pointermove', qPrepHandleStagePointerMove);
  document.removeEventListener('pointerup', qPrepHandleStagePointerUp);
  document.removeEventListener('pointercancel', qPrepHandleStagePointerUp);
}

function qPrepStartMoveItem(e, slotId, itemId, el) {
  if (e.button !== undefined && e.button !== 0) return;
  e.preventDefault();
  if (qPrepStageDragState) qPrepFinishStageMove();

  const slotEl = document.getElementById('prep-slot-' + slotId);
  const item = qPrepFindStageItem(slotId, itemId);
  if (!(slotEl && item)) return;

  const rect = el.getBoundingClientRect();
  item.z = ++qPrepStageZCounter;
  item.manual = true;
  el.style.zIndex = item.z;

  qPrepStageDragState = {
    slotId,
    itemId,
    el,
    width: rect.width,
    height: rect.height,
    offsetX: e.clientX - rect.left,
    offsetY: e.clientY - rect.top,
  };

  document.addEventListener('pointermove', qPrepHandleStagePointerMove);
  document.addEventListener('pointerup', qPrepHandleStagePointerUp);
  document.addEventListener('pointercancel', qPrepHandleStagePointerUp);
}

function qPrepHandleStagePointerMove(e) {
  if (!qPrepStageDragState) return;

  const { slotId, itemId, el, width, height, offsetX, offsetY } = qPrepStageDragState;
  const slotEl = document.getElementById('prep-slot-' + slotId);
  const slot = qPrepSlotById(slotId);
  const item = qPrepFindStageItem(slotId, itemId);
  if (!(slotEl && slot && item)) return;

  const slotRect = slotEl.getBoundingClientRect();
  const slotWidth = slot.w || qPrepDim(slot.size);
  const slotHeight = slot.h || qPrepDim(slot.size);
  const maxLeftPx = Math.max(0, slotRect.width - width);
  const maxTopPx = Math.max(0, slotRect.height - height);
  const leftPx = q3Clamp(e.clientX - slotRect.left - offsetX, 0, maxLeftPx);
  const topPx = q3Clamp(e.clientY - slotRect.top - offsetY, 0, maxTopPx);
  const scaleX = slotRect.width ? slotWidth / slotRect.width : 1;
  const scaleY = slotRect.height ? slotHeight / slotRect.height : 1;

  el.style.left = (leftPx * scaleX) + 'px';
  el.style.top = (topPx * scaleY) + 'px';

  item.x = q3Clamp((leftPx + width / 2) / slotRect.width, 0, 1);
  item.y = q3Clamp((topPx + height / 2) / slotRect.height, 0, 1);
}

function qPrepHandleStagePointerUp() {
  qPrepFinishStageMove();
}

function qPrepBuild() {
  qPrepFinishStageMove();
  qPrepPlacements = qPrepInitialPlacements();
  qPrepDragCandidateId = null;
  qPrepStageNextId = 1;
  qPrepStageZCounter = 1;
  qPrepBuilt = true;
  qPrepRenderAnnotations();
  qPrepRenderArrows();
  qPrepRenderStage();
  qPrepRenderPool();
  qPrepFitStage();

  if (!qPrepScaleBound) {
    window.addEventListener('resize', qPrepHandleResize);
    qPrepScaleBound = true;
  }
}

function qPrepReset() {
  qPrepFinishStageMove();
  qPrepPlacements = qPrepInitialPlacements();
  qPrepDragCandidateId = null;
  qPrepStageNextId = 1;
  qPrepStageZCounter = 1;
  if (!qPrepBuilt) return;
  qPrepBuild();
}

  document.querySelectorAll('.tab-pane').forEach((p,j)=>p.classList.toggle('active',i===j));

}

function q1Build() {
  const src = document.getElementById('q1-src');
  src.innerHTML = '';
  BASE.forEach(c => src.appendChild(chr(c, false, false))); // q1src uses CSS chr

  q1P = [];

  q1target.ondragover = e => { e.preventDefault(); q1target.classList.add('drop-active'); };
  q1target.ondragleave = () => q1target.classList.remove('drop-active');
  q1target.ondrop = e => {
    e.preventDefault(); q1target.classList.remove('drop-active');
    const id = e.dataTransfer.getData('text/plain');
    if (!id) return;
    q1P.push(id); clrFB('q1-fb'); q1Render();
  };
}

function q1Render() {
  const inner = document.getElementById('q1-t-inner');
  inner.innerHTML = '';
  if (q1P.length === 0) {
    const q = document.createElement('div'); q.className = 'q-mark'; q.textContent = '?';
    inner.appendChild(q);
  } else {
    q1P.forEach((id, idx) => {
      const c = BASE.find(x => x.id === id);
      if (!c) return;
      const wrap = document.createElement('div');
      wrap.className = 'q1-picked-item';
      const el = chr(c, false, false);
      const remove = document.createElement('button');
      remove.type = 'button';
      remove.className = 'q1-remove';
      remove.textContent = '×';
      remove.setAttribute('aria-label', '删除染色体');
      remove.addEventListener('click', e => {
        e.stopPropagation();
        q1P.splice(idx, 1);
        q1Render();
      });
      wrap.appendChild(el);
      wrap.appendChild(remove);
      inner.appendChild(wrap);
    });
  }

  const pool = document.getElementById('q1-pool');
  pool.innerHTML = '';
  // Always show all 4 chromosomes in pool
  BASE.forEach(c => {
    const s = document.createElement('div');
    s.className = 'pool-slot';
    s.appendChild(chr(c, false));
    pool.appendChild(s);
  });
  makeDots('q1-dots', 2, Math.min(q1P.length, 2));
}

function q1Check() {
  if (q1P.length < 2) { setFB('q1-fb','⚠️ 请先拖入2条染色体。','hint'); return; }
  const hasLong  = q1P.some(id=>BASE.find(c=>c.id===id).size==='long');
  const hasShort = q1P.some(id=>BASE.find(c=>c.id===id).size==='short');

      '这是因为减数第一次分裂时，<strong>同源染色体分离</strong>，每对中各取一条分配到子代细胞。<br>'+

  }

// SVG primitive helpers
function svgRect(x, y, w, h, r, fill, stroke, sw) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  el.setAttribute('x', x); el.setAttribute('y', y);
  el.setAttribute('width', w); el.setAttribute('height', h);
  el.setAttribute('rx', r); el.setAttribute('fill', fill);
  el.setAttribute('stroke', stroke); el.setAttribute('stroke-width', sw);
  return el;
}
function svgCircle(cx, cy, r, fill, stroke, sw) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  el.setAttribute('cx', cx); el.setAttribute('cy', cy); el.setAttribute('r', r);
  el.setAttribute('fill', fill); el.setAttribute('stroke', stroke); el.setAttribute('stroke-width', sw);
  return el;
}
function svgLine(x1, y1, x2, y2, sw, stroke) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  el.setAttribute('x1', x1); el.setAttribute('y1', y1);
  el.setAttribute('x2', x2); el.setAttribute('y2', y2);
  el.setAttribute('stroke-width', sw); el.setAttribute('stroke', stroke);
  el.setAttribute('stroke-linecap', 'round');
  return el;
}
function makeSVG(w, h) {
  const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  s.setAttribute('width', w); s.setAttribute('height', h);
  s.style.display = 'block'; s.style.overflow = 'visible';
  return s;
}

// Single straight chromosome bar (pool & result cells)
function chrBarSVG(data, size) {
  const isLong = data.size === 'long';
  const h = size==='xs' ? (isLong?38:24)
          : size==='sm' ? (isLong?52:32)
          : size==='md' ? (isLong?68:42)
          : size==='lg' ? (isLong?80:50)
          :               (isLong?68:42);
  const w = size==='xs' ? 8 : size==='sm' ? 10 : 12;
  const r = size==='xs' ? 3.5 : size==='sm' ? 4 : 5;
  const s = makeSVG(w, h);
  s.appendChild(svgRect(1, 1, w-2, h-2, 3, '#1ea7d8', '#0f6f94', 1.5));
  s.appendChild(svgCircle(w/2, h*0.42, r, '#1ea7d8', '#0f6f94', 1.5));
  return s;
}

// X-shape chromosome (replicated: 2 sister chromatids joined at centromere)
function chrXSVG(data, size) {
  const isLong = data.size === 'long';
  const arm = size==='xs' ? (isLong?18:12) : size==='sm' ? (isLong?26:17) : (isLong?36:22);
  const sp  = size==='xs' ? (isLong?5:4)   : size==='sm' ? (isLong?7:5)   : (isLong?9:6);
  const W = sp*2 + 14, H = arm*2 + 8;
  const cx = W/2, cy = H/2;
  const thick = size==='xs' ? (isLong?5:4) : size==='sm' ? (isLong?6:5) : (isLong?7:6);
  const s = makeSVG(W, H);
  [[cx,cy,cx-sp,cy-arm],[cx,cy,cx+sp,cy-arm],[cx,cy,cx-sp,cy+arm],[cx,cy,cx+sp,cy+arm]]
    .forEach(([x1,y1,x2,y2]) => {
      s.appendChild(svgLine(x1,y1,x2,y2,thick+2,'#0f6f94'));
      s.appendChild(svgLine(x1,y1,x2,y2,thick,'#1ea7d8'));
    });
  s.appendChild(svgCircle(cx, cy, size==='xs'?3:(isLong?5:4), '#1ea7d8', '#0f6f94', 1.5));
  return s;
}

// Straight result-cell chromosome (same as pool but not draggable)
function chrResultSVG(data) {
  return chrBarSVG(data, 'lg');
}

let q2Placements = {};

function q2InitialPlacements() {
  return Q2_FLOW_SLOTS.reduce((acc, slot) => {
    if (!slot.preset) acc[slot.id] = [];
    return acc;
  }, {});
}

function q2SlotById(id) {
  return Q2_FLOW_SLOTS.find(slot => slot.id === id);
}

function q2SlotIsPreset(slotId) {
  const slot = q2SlotById(slotId);
  return !!(slot && slot.preset);
}

function q2CandidateById(id) {
  return Q2_POOL_ITEMS.find(item => item.id === id);
}

function q2GetSlotItems(slotId) {
  if (!Array.isArray(q2Placements[slotId])) q2Placements[slotId] = [];
  return q2Placements[slotId];
}

function q2FindStageItem(slotId, itemId) {
  return q2GetSlotItems(slotId).find(item => item.id === itemId);
}

function q2CollectUsedCandidateIds() {
  return Object.values(q2Placements).flat().map(item => item.candidateId);
}

function q2CanAccept(slot, candidate) {
  return !!(slot && candidate && !slot.preset);
}

function q2ClearDropHighlights() {
  Q2_FLOW_SLOTS.forEach(slot => {
    const el = document.getElementById('q2-slot-' + slot.id);
    if (el) el.classList.remove('can-drop');
  });
}

function q2ReturnToPool(slotId, itemId) {
  if (!slotId || q2SlotIsPreset(slotId) || !itemId) return;
  q2Placements[slotId] = q2GetSlotItems(slotId).filter(item => item.id !== itemId);
  q2RenderPool();
  q2FlowRenderStage();
}

function q2FreezeSlotItems(slotId, slot=null) {
  const targetSlot = slot || q2SlotById(slotId);
  const items = q2GetSlotItems(slotId);
  if (!(targetSlot && items.length)) return;

  const autoCenters = q3AutoCenters(items.length);
  let autoIndex = 0;
  items.forEach(item => {
    if (item.manual) return;
    const candidate = q2CandidateById(item.candidateId);
    if (!candidate) return;
    const itemDim = q2PlacedItemDim(candidate, Q2_FLOW_SLOT_DIM, items.length);
    const autoPos = autoCenters[autoIndex] || { x:.5, y:.5 };
    const pos = q3ResolveStageItemPos(item, itemDim, Q2_FLOW_SLOT_DIM, autoPos);
    item.x = pos.x;
    item.y = pos.y;
    item.manual = true;
    autoIndex += 1;
  });
}

function q2DropCenterFromEvent(slotId, candidate, event) {
  const slot = q2SlotById(slotId);
  const slotEl = document.getElementById('q2-slot-' + slotId);
  if (!(slot && slotEl && event && Number.isFinite(event.clientX) && Number.isFinite(event.clientY))) {
    return { x:.5, y:.5 };
  }

  const currentCount = q2GetSlotItems(slotId).length + 1;
  const itemDim = q2PlacedItemDim(candidate, Q2_FLOW_SLOT_DIM, currentCount);
  const rect = slotEl.getBoundingClientRect();
  if (!rect.width || !rect.height) return { x:.5, y:.5 };

  const rawX = (event.clientX - rect.left) / rect.width;
  const rawY = (event.clientY - rect.top) / rect.height;
  const minX = itemDim / (Q2_FLOW_SLOT_DIM * 2);
  const maxX = 1 - minX;
  const minY = itemDim / (Q2_FLOW_SLOT_DIM * 2);
  const maxY = 1 - minY;
  return {
    x: q3Clamp(rawX, minX, maxX),
    y: q3Clamp(rawY, minY, maxY),
  };
}

function q2PoolDisplayScale() {
  const vw = q3ViewportWidth();
  if (vw <= 480) return 0.62;
  if (vw <= 768) return 0.72;
  if (vw <= 1024) return 0.84;
  return 1;
}

function q2TouchDragScale() {
  const vw = q3ViewportWidth();
  if (vw <= 480) return 0.42;
  if (vw <= 768) return 0.52;
  if (vw <= 1024) return 0.64;
  return 1;
}

function q2StageViewportScale() {
  const vw = q3ViewportWidth();
  if (vw <= 480) return 0.94;
  if (vw <= 768) return 0.97;
  if (vw <= 1024) return 1;
  return 1;
}

function q2PoolItemDim(candidate) {
  return Math.max(28, Math.round(candidate.poolDim * q2PoolDisplayScale()));
}

function q2StageScaleFactor(count) {
  if (count <= 1) return 0.96;
  if (count === 2) return 0.82;
  if (count <= 4) return 0.78;
  if (count <= 6) return 0.56;
  return 0.44;
}

function q2PlacedItemDim(candidate, slotDim, count) {
  const deviceScale = q2StageViewportScale();
  const maxDim = Math.round(
    slotDim * (count <= 1 ? 0.96 : count === 2 ? 0.86 : count <= 4 ? 0.86 : 0.66) * deviceScale
  );
  const scaled = Math.round(candidate.poolDim * q2StageScaleFactor(count) * deviceScale);
  return Math.max(16, Math.min(maxDim, scaled));
}

function q2CandidateNaturalBox(item) {
  if (!item) return { width: 60, height: 60 };
  if (item.kind === 'xLong') return { width: 28, height: 60 };
  if (item.kind === 'xShort') return { width: 24, height: 42 };
  if (item.kind === 'barLong') return { width: 10, height: 52 };
  if (item.kind === 'barShort') return { width: 10, height: 32 };
  return { width: item.poolDim || 60, height: item.poolDim || 60 };
}

function qStageRemoveInsets(containerDim, contentBox) {
  const contentWidth = Math.min(containerDim, contentBox.width || containerDim);
  const contentHeight = Math.min(containerDim, contentBox.height || containerDim);
  return {
    right: Math.max(-1, Math.round((containerDim - contentWidth) / 2) - 2),
    top: Math.max(-1, Math.round((containerDim - contentHeight) / 2) - 2),
  };
}

function q2StageContentBox(candidate, dim) {
  const natural = q2CandidateNaturalBox(candidate);
  const available = Math.max(16, dim - 4);
  const scale = Math.min(available / natural.width, available / natural.height);
  return {
    width: Math.max(12, Math.round(natural.width * scale)),
    height: Math.max(12, Math.round(natural.height * scale)),
  };
}

function q2CandidateSvg(item) {
  if (item.kind === 'xLong') return chrXSVG({ size:'long' }, 'sm');
  if (item.kind === 'xShort') return chrXSVG({ size:'short' }, 'sm');
  if (item.kind === 'barLong') return chrBarSVG({ size:'long' }, 'sm');
  return chrBarSVG({ size:'short' }, 'sm');
}

function q2CreateCandidateVisual(candidate, dim, mode='pool') {
  const natural = q2CandidateNaturalBox(candidate);
  const available = mode === 'stage' ? Math.max(16, dim - 4) : dim;
  const scale = Math.min(available / natural.width, available / natural.height);
  const boxWidth = mode === 'stage' ? dim : Math.max(14, Math.round(natural.width * scale));
  const boxHeight = mode === 'stage' ? dim : Math.max(18, Math.round(natural.height * scale));

  const outer = document.createElement('div');
  outer.className = 'q3-visual q3-visual-' + mode;
  outer.style.width = boxWidth + 'px';
  outer.style.height = boxHeight + 'px';

  const artboard = document.createElement('div');
  artboard.className = 'q3-visual-artboard';
  artboard.style.width = boxWidth + 'px';
  artboard.style.height = boxHeight + 'px';
  artboard.style.transform = 'none';

  const holder = document.createElement('div');
  holder.className = 'q3-visual-chr';
  holder.style.left = '50%';
  holder.style.top = '50%';
  holder.style.transform = `translate(-50%, -50%) scale(${scale})`;

  const svg = q2CandidateSvg(candidate);
  svg.style.display = 'block';
  holder.appendChild(svg);
  artboard.appendChild(holder);
  outer.appendChild(artboard);
  return outer;
}

function q2RenderPool() {
  const pool = document.getElementById('q2-pool');
  if (!pool) return;
  pool.innerHTML = '';

  const used = new Set(q2CollectUsedCandidateIds());
  Q2_POOL_ITEMS.filter(item => !used.has(item.id)).forEach(candidate => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'q2-pool-item';
    btn.draggable = true;
    btn.dataset.id = candidate.id;
    btn.appendChild(q2CreateCandidateVisual(candidate, q2PoolItemDim(candidate), 'pool'));

    btn.addEventListener('dragstart', e => {
      q2DragCandidateId = candidate.id;
      e.dataTransfer.setData('text/plain', candidate.id);
      setTimeout(() => btn.classList.add('dragging'), 0);
    });
    btn.addEventListener('dragend', () => {
      btn.classList.remove('dragging');
      q2DragCandidateId = null;
      q2ClearDropHighlights();
    });

    pool.appendChild(btn);
  });
}

function q2FlowPlaceSvg(board, svg, opts) {
  const wrap = document.createElement('div');
  wrap.className = 'q3-visual-chr';
  wrap.style.left = opts.x + 'px';
  wrap.style.top = opts.y + 'px';
  wrap.style.transform =
    `translate(-50%, -50%) rotate(${opts.rot || 0}deg) scale(${opts.scale == null ? 1 : opts.scale})`;
  svg.style.display = 'block';
  wrap.appendChild(svg);
  board.appendChild(wrap);
}

function q2FlowCreateVisual(kind, dim) {
  const outer = document.createElement('div');
  outer.className = 'q3-visual q3-visual-stage';
  outer.style.width = dim + 'px';
  outer.style.height = dim + 'px';

  const board = document.createElement('div');
  board.className = 'q3-visual-artboard';
  board.style.width = dim + 'px';
  board.style.height = dim + 'px';
  board.style.transform = 'none';

  if (kind === 'origin') {
    q2FlowPlaceSvg(board, chrBarSVG({ size:'long' }, 'sm'),  { x:34, y:60 });
    q2FlowPlaceSvg(board, chrBarSVG({ size:'long' }, 'sm'),  { x:54, y:60 });
    q2FlowPlaceSvg(board, chrBarSVG({ size:'short' }, 'sm'), { x:82, y:60 });
    q2FlowPlaceSvg(board, chrBarSVG({ size:'short' }, 'sm'), { x:100, y:60 });
  } else if (kind === 'replicated') {
    q2FlowPlaceSvg(board, chrXSVG({ size:'long' }, 'sm'),  { x:35, y:40, rot:-28, scale:1.0 });
    q2FlowPlaceSvg(board, chrXSVG({ size:'short' }, 'sm'), { x:65, y:52, rot:22,  scale:0.95 });
    q2FlowPlaceSvg(board, chrXSVG({ size:'short' }, 'sm'), { x:54, y:82, rot:30,  scale:0.95 });
    q2FlowPlaceSvg(board, chrXSVG({ size:'long' }, 'sm'),  { x:92, y:44, rot:-14, scale:1.0 });
  } else if (kind === 'final') {
    q2FlowPlaceSvg(board, chrBarSVG({ size:'long' }, 'sm'),  { x:48, y:60 });
    q2FlowPlaceSvg(board, chrBarSVG({ size:'short' }, 'sm'), { x:79, y:60 });
  }

  outer.appendChild(board);
  return outer;
}

function q2FlowRenderArrows() {
  const svg = document.getElementById('q2-flow-svg');
  if (!svg) return;

function q2FlowRenderStage() {
  const layer = document.getElementById('q2-flow-layer');
  if (!layer) return;
  layer.innerHTML = '';

  Q2_FLOW_SLOTS.forEach(slot => {
    const el = document.createElement('div');
    el.id = 'q2-slot-' + slot.id;
    el.className = 'q3-stage-slot';
    el.style.width = Q2_FLOW_SLOT_DIM + 'px';
    el.style.height = Q2_FLOW_SLOT_DIM + 'px';
    el.style.left = slot.x + 'px';
    el.style.top = slot.y + 'px';
    el.dataset.droppable = 'true';
    if (slot.preset) {
      el.classList.add('filled', 'preset');
      el.appendChild(q2FlowCreateVisual(slot.preset, Q2_FLOW_SLOT_DIM));
    } else {
      const items = q2GetSlotItems(slot.id)
        .slice()
        .sort((a, b) => a.z - b.z);
      if (items.length) el.classList.add('filled');

      const autoCenters = q3AutoCenters(items.length);
      let autoIndex = 0;
      items.forEach(item => {
        const candidate = q2CandidateById(item.candidateId);
        if (!candidate) return;

        const itemDim = q2PlacedItemDim(candidate, Q2_FLOW_SLOT_DIM, items.length);
        const autoPos = autoCenters[autoIndex] || { x:.5, y:.5 };
        const pos = q3ResolveStageItemPos(item, itemDim, Q2_FLOW_SLOT_DIM, autoPos);
        if (!item.manual) autoIndex += 1;

        const piece = document.createElement('div');
        piece.className = 'q3-stage-item';
        piece.dataset.slotId = slot.id;
        piece.dataset.itemId = item.id;
        piece.style.width = itemDim + 'px';
        piece.style.height = itemDim + 'px';
        piece.style.left = pos.left + 'px';
        piece.style.top = pos.top + 'px';
        piece.style.zIndex = item.z;

        const visual = q2CreateCandidateVisual(candidate, itemDim, 'stage');
        visual.style.pointerEvents = 'none';
        piece.appendChild(visual);

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'q3-stage-remove';
        removeBtn.textContent = '×';
        {
          const inset = qStageRemoveInsets(itemDim, q2StageContentBox(candidate, itemDim));
          removeBtn.style.right = inset.right + 'px';
          removeBtn.style.top = inset.top + 'px';
        }
        removeBtn.addEventListener('pointerdown', e => e.stopPropagation());
        removeBtn.addEventListener('click', e => {
          e.preventDefault();
          e.stopPropagation();
          q2ReturnToPool(slot.id, item.id);
        });
        piece.appendChild(removeBtn);

        piece.addEventListener('pointerdown', e => q2StartStageMove(e, slot.id, item.id, piece));
        el.appendChild(piece);
      });
    }

    el.ondragover = e => {
      if (!q2CanAccept(slot, q2CandidateById(q2DragCandidateId))) return;
      e.preventDefault();
      el.classList.add('can-drop');
    };
    el.ondragleave = () => el.classList.remove('can-drop');
    el.ondrop = e => {
      e.preventDefault();
      el.classList.remove('can-drop');
      q2HandleDrop(slot.id, e.dataTransfer.getData('text/plain'), e);
    };

    layer.appendChild(el);
  });
}

function q2FlowFitStage() {
  const shell = document.getElementById('q2-flow-fit');
  const stage = document.getElementById('q2-flow-stage');
  if (!(shell && stage)) return;

  const parent = shell.parentElement;
  const availableWidth = parent ? parent.clientWidth : shell.clientWidth;
  const scale = availableWidth ? Math.min(1, availableWidth / Q2_FLOW_SIZE.width) : 1;

  shell.style.height = (Q2_FLOW_SIZE.height * scale) + 'px';
  stage.style.transform = `scale(${scale})`;
}

function q2HandleDrop(slotId, candidateId, event=null) {
  const slot = q2SlotById(slotId);
  const candidate = q2CandidateById(candidateId);
  if (!slot || !candidate) return;
  if (!q2CanAccept(slot, candidate)) return;

  const used = new Set(q2CollectUsedCandidateIds());
  if (used.has(candidateId)) return;

  q2FreezeSlotItems(slotId, slot);
  const dropPos = q2DropCenterFromEvent(slotId, candidate, event);

  q2GetSlotItems(slotId).push({
    id: 'q2-stage-item-' + q2StageNextId++,
    candidateId,
    x: dropPos.x,
    y: dropPos.y,
    manual: true,
    z: ++q2StageZCounter,
  });
  q2RenderPool();
  q2FlowRenderStage();
}

function q2FinishStageMove() {
  q2StageDragState = null;
  document.removeEventListener('pointermove', q2HandleStagePointerMove);
  document.removeEventListener('pointerup', q2HandleStagePointerUp);
  document.removeEventListener('pointercancel', q2HandleStagePointerUp);
}

function q2StartStageMove(e, slotId, itemId, el) {
  if (e.button !== undefined && e.button !== 0) return;
  e.preventDefault();
  if (q2StageDragState) q2FinishStageMove();

  const slotEl = document.getElementById('q2-slot-' + slotId);
  const item = q2FindStageItem(slotId, itemId);
  if (!(slotEl && item)) return;

  const rect = el.getBoundingClientRect();
  item.z = ++q2StageZCounter;
  item.manual = true;
  el.style.zIndex = item.z;

  q2StageDragState = {
    slotId,
    itemId,
    el,
    width: rect.width,
    height: rect.height,
    offsetX: e.clientX - rect.left,
    offsetY: e.clientY - rect.top,
  };

  document.addEventListener('pointermove', q2HandleStagePointerMove);
  document.addEventListener('pointerup', q2HandleStagePointerUp);
  document.addEventListener('pointercancel', q2HandleStagePointerUp);
}

function q2HandleStagePointerMove(e) {
  if (!q2StageDragState) return;

  const { slotId, itemId, el, width, height, offsetX, offsetY } = q2StageDragState;
  const slotEl = document.getElementById('q2-slot-' + slotId);
  const slot = q2SlotById(slotId);
  const item = q2FindStageItem(slotId, itemId);
  if (!(slotEl && slot && item)) return;

  const slotRect = slotEl.getBoundingClientRect();
  const maxLeftPx = Math.max(0, slotRect.width - width);
  const maxTopPx = Math.max(0, slotRect.height - height);
  const leftPx = q3Clamp(e.clientX - slotRect.left - offsetX, 0, maxLeftPx);
  const topPx = q3Clamp(e.clientY - slotRect.top - offsetY, 0, maxTopPx);
  const scaleX = slotRect.width ? Q2_FLOW_SLOT_DIM / slotRect.width : 1;
  const scaleY = slotRect.height ? Q2_FLOW_SLOT_DIM / slotRect.height : 1;

  el.style.left = (leftPx * scaleX) + 'px';
  el.style.top = (topPx * scaleY) + 'px';

  item.x = q3Clamp((leftPx + width / 2) / slotRect.width, 0, 1);
  item.y = q3Clamp((topPx + height / 2) / slotRect.height, 0, 1);
}

function q2HandleStagePointerUp() {
  q2FinishStageMove();
}

function q2CreatePiece(type, context='stage') {
  const wrap = document.createElement('div');
  wrap.className = 'q2-piece' + (context === 'palette' ? ' q2-piece-palette' : '');

  if (type === 'cell') {
    const circle = document.createElement('div');
    circle.className = 'q2-piece-cell';
    wrap.appendChild(circle);
    return wrap;
  }

  if (type === 'arrow') {
    const arrow = document.createElement('div');
    arrow.className = 'q2-piece-arrow';
    arrow.textContent = '→';
    wrap.appendChild(arrow);
    return wrap;
  }

  const size = context === 'palette' ? 'sm' : 'xs';
  const barSize = context === 'palette' ? 'sm' : 'xs';

  if (type === 'xLong')  { wrap.appendChild(chrXSVG({ size:'long'  }, size)); return wrap; }
  if (type === 'xShort') { wrap.appendChild(chrXSVG({ size:'short' }, size)); return wrap; }
  if (type === 'barLong'){ wrap.appendChild(chrBarSVG({ size:'long'  }, barSize)); return wrap; }
  wrap.appendChild(chrBarSVG({ size:'short' }, barSize));
  return wrap;
}

function q2RenderPalette() {
  const palette = document.getElementById('q2-palette');
  if (!palette) return;
  palette.innerHTML = '';

  Q2_TEMPLATE_ITEMS.forEach(template => {
    const item = document.createElement('button');
    item.type = 'button';
    item.className = 'q2-palette-item';

    item.addEventListener('pointerdown', e => q2StartPaletteDrag(e, template.type));
    palette.appendChild(item);
  });
}

function q2ClampPosition(x, y, type, widthOverride, heightOverride) {
  const stage = document.getElementById('q2-stage');
  const meta = Q2_ITEM_META[type];
  if (!stage || !meta) return { x, y };

  const width = widthOverride || meta.width;
  const height = heightOverride || meta.height;
  const maxX = Math.max(0, stage.clientWidth - width);
  const maxY = Math.max(0, stage.clientHeight - height);

  return {
    x: Math.min(Math.max(0, x), maxX),
    y: Math.min(Math.max(0, y), maxY),
  };
}

function q2RenderStageItems() {
  const layer = document.getElementById('q2-stage-layer');
  if (!layer) return;
  layer.innerHTML = '';

  q2Items
    .slice()
    .sort((a, b) => a.z - b.z)
    .forEach(item => {
      const meta = Q2_ITEM_META[item.type];
      if (!meta) return;

      const el = document.createElement('div');
      el.className = 'q2-stage-item';
      el.dataset.id = item.id;
      el.style.width = meta.width + 'px';
      el.style.height = meta.height + 'px';
      el.style.left = item.x + 'px';
      el.style.top = item.y + 'px';
      el.style.zIndex = item.z;

      el.appendChild(q2CreatePiece(item.type, 'stage'));

      const remove = document.createElement('button');
      remove.type = 'button';
      remove.className = 'q2-stage-remove';
      remove.textContent = '×';
      remove.addEventListener('pointerdown', e => e.stopPropagation());
      remove.addEventListener('click', e => {
        e.stopPropagation();
        q2RemoveItem(item.id);
      });
      el.appendChild(remove);

      el.addEventListener('pointerdown', e => q2StartMoveItem(e, item.id, el));
      layer.appendChild(el);
    });
}

function q2SetStageActive(active) {
  const stage = document.getElementById('q2-stage');
  if (stage) stage.classList.toggle('is-drop-target', !!active);
}

function q2PointInStage(clientX, clientY) {
  const stage = document.getElementById('q2-stage');
  if (!stage) return false;
  const rect = stage.getBoundingClientRect();
  return clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom;
}

function q2PositionGhost(clientX, clientY) {
  if (!q2DragState || !q2DragState.ghost) return;
  const x = clientX - q2DragState.width / 2;
  const y = clientY - q2DragState.height / 2;
  q2DragState.ghost.style.transform = `translate(${x}px, ${y}px)`;
  q2SetStageActive(q2PointInStage(clientX, clientY));
}

function q2StartPaletteDrag(e, type) {
  if (e.button !== undefined && e.button !== 0) return;
  e.preventDefault();
  if (q2DragState) q2FinishDrag();

  const meta = Q2_ITEM_META[type];
  if (!meta) return;

  const ghost = document.createElement('div');
  ghost.className = 'q2-drag-ghost';
  ghost.style.width = meta.width + 'px';
  ghost.style.height = meta.height + 'px';
  ghost.appendChild(q2CreatePiece(type, 'stage'));
  document.body.appendChild(ghost);

  q2DragState = {
    mode: 'new',
    type,
    ghost,
    width: meta.width,
    height: meta.height,
  };

  q2PositionGhost(e.clientX, e.clientY);
  document.addEventListener('pointermove', q2HandlePointerMove);
  document.addEventListener('pointerup', q2HandlePointerUp);
}

function q2StartMoveItem(e, id, el) {
  if (e.button !== undefined && e.button !== 0) return;
  e.preventDefault();
  if (q2DragState) q2FinishDrag();

  const item = q2Items.find(entry => entry.id === id);
  if (!item) return;

  const rect = el.getBoundingClientRect();
  item.z = ++q2ZCounter;
  el.style.zIndex = item.z;

  q2DragState = {
    mode: 'move',
    id,
    el,
    width: rect.width,
    height: rect.height,
    offsetX: e.clientX - rect.left,
    offsetY: e.clientY - rect.top,
  };

  document.addEventListener('pointermove', q2HandlePointerMove);
  document.addEventListener('pointerup', q2HandlePointerUp);
}

function q2HandlePointerMove(e) {
  if (!q2DragState) return;

  if (q2DragState.mode === 'new') {
    q2PositionGhost(e.clientX, e.clientY);
    return;
  }

  const stage = document.getElementById('q2-stage');
  const item = q2Items.find(entry => entry.id === q2DragState.id);
  if (!stage || !item) return;

  const rect = stage.getBoundingClientRect();
  const pos = q2ClampPosition(
    e.clientX - rect.left - q2DragState.offsetX,
    e.clientY - rect.top - q2DragState.offsetY,
    item.type,
    q2DragState.width,
    q2DragState.height
  );

  item.x = pos.x;
  item.y = pos.y;
  q2DragState.el.style.left = pos.x + 'px';
  q2DragState.el.style.top = pos.y + 'px';
}

function q2HandlePointerUp(e) {
  if (!q2DragState) return;

  if (q2DragState.mode === 'new' && q2PointInStage(e.clientX, e.clientY)) {
    q2AddItem(q2DragState.type, e.clientX, e.clientY);
  }

  q2FinishDrag();
}

function q2FinishDrag() {
  if (q2DragState && q2DragState.ghost && q2DragState.ghost.parentNode) {
    q2DragState.ghost.parentNode.removeChild(q2DragState.ghost);
  }

  q2DragState = null;
  q2SetStageActive(false);
  document.removeEventListener('pointermove', q2HandlePointerMove);
  document.removeEventListener('pointerup', q2HandlePointerUp);
}

function q2AddItem(type, clientX, clientY) {
  const stage = document.getElementById('q2-stage');
  const meta = Q2_ITEM_META[type];
  if (!stage || !meta) return;

  const rect = stage.getBoundingClientRect();
  const pos = q2ClampPosition(
    clientX - rect.left - meta.width / 2,
    clientY - rect.top - meta.height / 2,
    type
  );

  q2Items.push({
    id: 'q2-item-' + q2NextId++,
    type,
    x: pos.x,
    y: pos.y,
    z: ++q2ZCounter,
  });

  clrFB('q2-fb');
  q2RenderStageItems();
}

function q2RemoveItem(id) {
  q2Items = q2Items.filter(item => item.id !== id);
  clrFB('q2-fb');
  q2RenderStageItems();
}

function q2ClampAllItems() {
  const stage = document.getElementById('q2-stage');
  if (!stage || !stage.clientWidth || !stage.clientHeight) return;

  q2Items.forEach(item => {
    const pos = q2ClampPosition(item.x, item.y, item.type);
    item.x = pos.x;
    item.y = pos.y;
  });

  q2RenderStageItems();
}

function q2Build() {
  q2FinishStageMove();
  q2Placements = q2InitialPlacements();
  q2DragCandidateId = null;
  q2StageNextId = 1;
  q2StageZCounter = 1;
  q2FlowRenderAnnotations();
  q2FlowRenderArrows();
  q2FlowRenderStage();
  q2RenderPool();
  q2FlowFitStage();
  clrFB('q2-fb');

  if (!q2FlowScaleBound) {
    window.addEventListener('resize', q2FlowFitStage);
    q2FlowScaleBound = true;
  }
}

function q2Hint() {
  setFB('q2-fb','💡 先从待选区拖出一个空细胞和一枚箭头，补出“复制后细胞”；再继续拖出两个空细胞和一枚箭头，补出第一次分裂后的两个子细胞。X形染色体表示复制后，直条染色体表示分裂后的染色体。','hint');
}

function q2ShowResults() {}

function q2Check() {
  const counts = q2Items.reduce((acc, item) => {
    acc[item.type] = (acc[item.type] || 0) + 1;
    return acc;
  }, {});

  const enough =
    (counts.cell || 0) >= 3 &&
    (counts.arrow || 0) >= 2 &&
    (counts.xLong || 0) >= 2 &&
    (counts.xShort || 0) >= 2 &&
    (counts.barLong || 0) >= 2 &&
    (counts.barShort || 0) >= 2;

  if (enough) {
    setFB('q2-fb','🎉 关键素材已经补齐。接下来可以继续调整摆放顺序，对照“精原细胞 → 复制后细胞 → 第一次分裂后的2个子细胞”完成自己的减半过程图。','success');
  } else {
    q2Hint();
  }
}

function q2Reset() {
  q2Build();
}
