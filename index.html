function q3SlotById(id) {
  return Q3_STAGE_SLOTS.find(slot => slot.id === id);
}

function q3CandidateById(id) {
  return Q3_ITEM_LIBRARY.find(item => item.id === id);
}

function q3Dim(sizeKey) {
  return Q3_SLOT_DIM[sizeKey] || 88;
}

function q3InitialPlacements() {
  return Q3_STAGE_SLOTS.reduce((acc, slot) => {
    if (!Q3_PRESET_PLACEMENTS[slot.id]) acc[slot.id] = [];
    return acc;
  }, {});
}

function q3SlotIsPreset(slotId) {
  return !!Q3_PRESET_PLACEMENTS[slotId];
}

function q3GetSlotItems(slotId) {
  if (!Array.isArray(q3Placements[slotId])) q3Placements[slotId] = [];
  return q3Placements[slotId];
}

function q3FindStageItem(slotId, itemId) {
  return q3GetSlotItems(slotId).find(item => item.id === itemId);
}

function q3Clamp(value, min, max) {
  return Math.min(Math.max(value, min), max);
}

function q3AutoCenters(count) {
  if (Q3_AUTO_CENTERS[count]) return Q3_AUTO_CENTERS[count];

  const cols = Math.max(2, Math.ceil(Math.sqrt(count)));
  const rows = Math.ceil(count / cols);
  const centers = [];
  for (let i = 0; i < count; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    centers.push({
      x: (col + 1) / (cols + 1),
      y: (row + 1) / (rows + 1),
    });
  }
  return centers;
}

function q3ViewportWidth() {
  return Math.max(
    window.innerWidth || 0,
    document.documentElement ? document.documentElement.clientWidth : 0,
    0
  );
}

function q3PoolDisplayScale() {
  const vw = q3ViewportWidth();
  if (vw <= 480) return 0.52;
  if (vw <= 768) return 0.60;
  if (vw <= 1024) return 0.72;
  return 1;
}

function q3StageViewportScale() {
  const vw = q3ViewportWidth();
  if (vw <= 480) return 0.90;
  if (vw <= 768) return 0.95;
  if (vw <= 1024) return 0.98;
  return 1;
}

function q3PoolItemDim(candidate) {
  return Math.max(42, Math.round(candidate.poolDim * q3PoolDisplayScale()));
}

function q3TouchDragScale() {
  const vw = q3ViewportWidth();
  if (vw <= 480) return 0.42;
  if (vw <= 768) return 0.50;
  if (vw <= 1024) return 0.62;
  return 1;
}

function q3StageScaleFactor(count) {
  if (count <= 1) return 0.64;
  if (count === 2) return 0.56;
  if (count <= 4) return 0.46;
  if (count <= 6) return 0.36;
  return 0.30;
}

function q3PlacedItemDim(candidate, slotDim, count) {
  const slotBase = typeof slotDim === 'number'
    ? slotDim
    : Math.min(slotDim.width || slotDim.w || 74, slotDim.height || slotDim.h || 74);
  const deviceScale = q3StageViewportScale();
  const maxDim = Math.round(
    slotBase * (count <= 1 ? 0.74 : count === 2 ? 0.64 : count <= 4 ? 0.54 : 0.45) * deviceScale
  );
  const scaled = Math.round(candidate.poolDim * q3StageScaleFactor(count) * deviceScale);
  return Math.max(16, Math.min(maxDim, scaled));
}

function q3ResolveStageItemPos(item, itemDim, slotDim, autoPos) {
  const slotWidth = typeof slotDim === 'number' ? slotDim : (slotDim.width || slotDim.w || 74);
  const slotHeight = typeof slotDim === 'number' ? slotDim : (slotDim.height || slotDim.h || slotWidth);
  const itemWidth = typeof itemDim === 'number' ? itemDim : (itemDim.width || itemDim.w || 74);
  const itemHeight = typeof itemDim === 'number' ? itemDim : (itemDim.height || itemDim.h || itemWidth);
  const minX = itemWidth / (slotWidth * 2);
  const maxX = 1 - minX;
  const minY = itemHeight / (slotHeight * 2);
  const maxY = 1 - minY;
  const centerX = item.manual ? (item.x ?? .5) : autoPos.x;
  const centerY = item.manual ? (item.y ?? .5) : autoPos.y;
  const x = q3Clamp(centerX, minX, maxX);
  const y = q3Clamp(centerY, minY, maxY);
  return {
    x,
    y,
    left: x * slotWidth - itemWidth / 2,
    top: y * slotHeight - itemHeight / 2,
  };
}

function q3CollectUsedCandidateIds() {
  return Object.values(q3Placements).flatMap(items =>
    Array.isArray(items) ? items.map(item => item.candidateId) : []
  );
}

function q3FinishStageMove() {
  q3StageDragState = null;
  document.removeEventListener('pointermove', q3HandleStagePointerMove);
  document.removeEventListener('pointerup', q3HandleStagePointerUp);
  document.removeEventListener('pointercancel', q3HandleStagePointerUp);
}

function q3StartMoveItem(e, slotId, itemId, el) {
  if (e.button !== undefined && e.button !== 0) return;
  e.preventDefault();
  if (q3StageDragState) q3FinishStageMove();

  const slotEl = document.getElementById('q3-slot-' + slotId);
  const item = q3FindStageItem(slotId, itemId);
  if (!(slotEl && item)) return;

  const rect = el.getBoundingClientRect();
  item.z = ++q3StageZCounter;
  item.manual = true;
  el.style.zIndex = item.z;

  q3StageDragState = {
    slotId,
    itemId,
    el,
    width: rect.width,
    height: rect.height,
    offsetX: e.clientX - rect.left,
    offsetY: e.clientY - rect.top,
  };

  document.addEventListener('pointermove', q3HandleStagePointerMove);
  document.addEventListener('pointerup', q3HandleStagePointerUp);
  document.addEventListener('pointercancel', q3HandleStagePointerUp);
}

function q3HandleStagePointerMove(e) {
  if (!q3StageDragState) return;

  const { slotId, itemId, el, width, height, offsetX, offsetY } = q3StageDragState;
  const slotEl = document.getElementById('q3-slot-' + slotId);
  const slot = q3SlotById(slotId);
  const item = q3FindStageItem(slotId, itemId);
  if (!(slotEl && slot && item)) return;

  const slotRect = slotEl.getBoundingClientRect();
  const slotDim = q3Dim(slot.size);
  const maxLeftPx = Math.max(0, slotRect.width - width);
  const maxTopPx = Math.max(0, slotRect.height - height);
  const leftPx = q3Clamp(e.clientX - slotRect.left - offsetX, 0, maxLeftPx);
  const topPx = q3Clamp(e.clientY - slotRect.top - offsetY, 0, maxTopPx);
  const scaleX = slotRect.width ? slotDim / slotRect.width : 1;
  const scaleY = slotRect.height ? slotDim / slotRect.height : 1;

  el.style.left = (leftPx * scaleX) + 'px';
  el.style.top = (topPx * scaleY) + 'px';

  item.x = q3Clamp((leftPx + width / 2) / slotRect.width, 0, 1);
  item.y = q3Clamp((topPx + height / 2) / slotRect.height, 0, 1);
}

function q3HandleStagePointerUp() {
  q3FinishStageMove();
}

function q3ChrPairSVG(item, size) {

  const gap = size === 'lg' ? 5 : size === 'md' ? 4.2 : 3.6;

  const stroke = item.col === 'red' ? Q4_COLORS.redDark : Q4_COLORS.blueDark;

  [2, 2 + thick + gap].forEach(y => {

}

function q3BranchPairSVG(item, size='sm') {
  const isLong = item.size === 'long';
  const len = size === 'xxs'   ? (isLong ? 12 : 8)
            : size === 'xs'    ? (isLong ? 15 : 10)
            : size === 'pool'  ? (isLong ? 18 : 12)
            : size === 'stage' ? (isLong ? 17 : 11)
            : size === 'md'    ? (isLong ? 24 : 16)
            :                    (isLong ? 20 : 13);
  const spread = size === 'xxs'   ? (isLong ? 3.2 : 2.4)
               : size === 'xs'    ? (isLong ? 4.2 : 3.0)
               : size === 'pool'  ? (isLong ? 4.9 : 3.4)
               : size === 'stage' ? (isLong ? 4.6 : 3.2)
               : size === 'md'    ? (isLong ? 6.4 : 4.6)
               :                    (isLong ? 5.3 : 3.8);
  const thick = size === 'xxs'   ? (isLong ? 4.0 : 3.2)
              : size === 'xs'    ? (isLong ? 4.8 : 3.8)
              : size === 'pool'  ? (isLong ? 5.4 : 4.2)
              : size === 'stage' ? (isLong ? 5.1 : 4.0)
              : size === 'md'    ? (isLong ? 6.8 : 5.2)
              :                    (isLong ? 5.8 : 4.4);
  const cx = len + 8;
  const cy = len * 0.5 + 8;
  const w = cx * 2;
  const h = cy * 2;
  const fill = item.col === 'red' ? Q4_COLORS.red : Q4_COLORS.blue;
  const stroke = item.col === 'red' ? Q4_COLORS.redDark : Q4_COLORS.blueDark;
  const dotR = size === 'xxs' ? 2.7 : size === 'xs' ? 3.1 : size === 'pool' ? 3.45 : size === 'stage' ? 3.35 : 4.0;
  const s = makeSVG(w, h);

  [
    [cx, cy, cx - len, cy - spread],
    [cx, cy, cx - len, cy + spread],
    [cx, cy, cx + len, cy - spread],
    [cx, cy, cx + len, cy + spread],
  ].forEach(([x1, y1, x2, y2]) => {
    s.appendChild(svgLine(x1, y1, x2, y2, thick + 2, stroke));
    s.appendChild(svgLine(x1, y1, x2, y2, thick, fill));
  });
  s.appendChild(svgCircle(cx, cy, dotR, fill, '#64748b', 1.1));
  return s;
}

function q3FlatPairSVG(item, size='pool') {
  const isLong = item.size === 'long';
  const len = size === 'pool' ? (isLong ? 38 : 27) : (isLong ? 34 : 24);
  const band = size === 'pool' ? (isLong ? 8.4 : 7.2) : (isLong ? 7.6 : 6.6);
  const gap = size === 'pool' ? (isLong ? 10.5 : 8.6) : (isLong ? 9.4 : 7.8);
  const ovalW = size === 'pool' ? (isLong ? 11 : 9.5) : (isLong ? 10 : 8.8);
  const ovalH = size === 'pool' ? (isLong ? 18 : 15) : (isLong ? 16 : 13.5);
  const pad = 5;
  const w = len + pad * 2;
  const h = band * 2 + gap + pad * 2;
  const cx = w / 2;
  const cy = h / 2;
  const fill = item.col === 'red' ? Q4_COLORS.red : Q4_COLORS.blue;
  const stroke = item.col === 'red' ? Q4_COLORS.redDark : Q4_COLORS.blueDark;

  const topY = cy - gap / 2 - band;
  const bottomY = cy + gap / 2;
  const half = len / 2;
  const taper = isLong ? 3.2 : 2.4;
  const s = makeSVG(w, h);

  const top = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  top.setAttribute('d', `M ${cx - half} ${topY + band*0.18} L ${cx - ovalW*0.45} ${topY} L ${cx + ovalW*0.45} ${topY} L ${cx + half} ${topY + band*0.18} L ${cx + half - taper} ${topY + band} L ${cx + ovalW*0.5} ${topY + band*0.88} L ${cx - ovalW*0.5} ${topY + band*0.88} L ${cx - half + taper} ${topY + band} Z`);
  top.setAttribute('fill', fill);
  top.setAttribute('stroke', stroke);
  top.setAttribute('stroke-width', '1.2');
  s.appendChild(top);

  const bottom = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  bottom.setAttribute('d', `M ${cx - half + taper} ${bottomY} L ${cx - ovalW*0.5} ${bottomY + band*0.12} L ${cx + ovalW*0.5} ${bottomY + band*0.12} L ${cx + half - taper} ${bottomY} L ${cx + half} ${bottomY + band*0.82} L ${cx + ovalW*0.45} ${bottomY + band} L ${cx - ovalW*0.45} ${bottomY + band} L ${cx - half} ${bottomY + band*0.82} Z`);
  bottom.setAttribute('fill', fill);
  bottom.setAttribute('stroke', stroke);
  bottom.setAttribute('stroke-width', '1.2');
  s.appendChild(bottom);

  const oval = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
  oval.setAttribute('cx', cx);
  oval.setAttribute('cy', cy);
  oval.setAttribute('rx', ovalW / 2);
  oval.setAttribute('ry', ovalH / 2);
  oval.setAttribute('fill', 'none');
  oval.setAttribute('stroke', '#0f6f94');
  oval.setAttribute('stroke-width', size === 'pool' ? '3.1' : '2.6');
  s.appendChild(oval);

  return s;
}

function q3CreateDiagramChromosome(spec, mode) {
  const wrap = document.createElement('div');
  wrap.className = 'q3-visual-chr';
  wrap.style.left = spec.x + '%';
  wrap.style.top = spec.y + '%';
  wrap.style.transform = `translate(-50%, -50%) rotate(${spec.rot || 0}deg)`;

  const item = { size: spec.size, col: spec.col };
  const sizeKey = mode === 'pool'
    ? (spec.poolSize || 'sm')
    : (spec.stageSize || 'xxs');
  const svg = spec.shape === 'pair'
    ? q3BranchPairSVG(item, sizeKey)
    : spec.shape === 'poolChrom1'
      ? q3PoolChromSVG('small', 'red')
    : spec.shape === 'poolChrom2'
      ? q3PoolChromSVG('large', 'red')
    : spec.shape === 'poolChrom3'
      ? q3PoolChromSVG('small', 'blue')
    : spec.shape === 'poolChrom4'
      ? q3PoolChromSVG('large', 'blue')
    : spec.shape === 'poolChrom5'
      ? q3PoolOpenChromSVG('large', 'red', 'down')
    : spec.shape === 'poolChrom6'
      ? q3PoolOpenChromSVG('small', 'red', 'down')
    : spec.shape === 'poolChrom7'
      ? q3PoolOpenChromSVG('large', 'red', 'up')
    : spec.shape === 'poolChrom8'
      ? q3PoolOpenChromSVG('small', 'red', 'up')
    : spec.shape === 'poolChrom9'
      ? q3PoolOpenChromSVG('large', 'blue', 'down')
    : spec.shape === 'poolChrom10'
      ? q3PoolOpenChromSVG('small', 'blue', 'down')
    : spec.shape === 'poolChrom11'
      ? q3PoolOpenChromSVG('large', 'blue', 'up')
    : spec.shape === 'poolChrom12'
      ? q3PoolOpenChromSVG('small', 'blue', 'up')
    : spec.shape === 'flatPair'
      ? q3FlatPairSVG(item, sizeKey)
      : q3BranchBarSVG(item, sizeKey);
  svg.style.display = 'block';
  wrap.appendChild(svg);
  return wrap;
}

function q3CreateCandidateVisual(candidate, dim, mode='pool') {
  const spec = Q3_VISUAL_LIBRARY[candidate.kind];
  const layout = Q3_POOL_LAYOUTS[candidate.kind] || null;
  const poolLayout = mode === 'pool' ? layout : null;
  const outer = document.createElement('div');
  outer.className = 'q3-visual q3-visual-' + mode;
  outer.style.width = dim + 'px';
  outer.style.height = dim + 'px';

  if (!spec) return outer;

  const artboard = document.createElement('div');
  artboard.className = 'q3-visual-artboard';
  if (mode === 'stage') {
    artboard.style.width = dim + 'px';
    artboard.style.height = dim + 'px';
    artboard.style.transform = 'none';
  } else if (poolLayout) {
    const boardWidth = poolLayout.width || 120;
    const boardHeight = poolLayout.height || 56;
    artboard.style.width = boardWidth + 'px';
    artboard.style.height = boardHeight + 'px';
    artboard.style.transformOrigin = 'center center';
    artboard.style.transform = `scale(${Math.min(dim / boardWidth, dim / boardHeight)})`;
  } else {
    artboard.style.width = '112px';
    artboard.style.height = '88px';
    artboard.style.transformOrigin = 'center center';
    artboard.style.transform = `scale(${dim / 112})`;
  }

  const chroms = mode === 'stage'
    ? ((spec.stageChroms && spec.stageChroms.length) ? spec.stageChroms : (layout ? layout.chroms : []))
    : (poolLayout ? poolLayout.chroms : (spec.chroms || []));
  chroms.forEach(item => artboard.appendChild(q3CreateDiagramChromosome(item, mode)));
  outer.appendChild(artboard);
  return outer;
}

function q3StageContentBox(candidate, dim) {
  const layout = Q3_POOL_LAYOUTS[candidate.kind] || null;
  if (layout) {
    const boardWidth = layout.width || 120;
    const boardHeight = layout.height || 56;
    const scale = Math.min(dim / boardWidth, dim / boardHeight);
    return {
      width: Math.max(12, Math.round(boardWidth * scale)),
      height: Math.max(12, Math.round(boardHeight * scale)),
    };
  }
  return {
    width: dim,
    height: Math.max(12, Math.round(dim * (88 / 112))),
  };
}

function q3CreatePlacedStageVisual(candidate, contentBox) {
  const spec = Q3_VISUAL_LIBRARY[candidate.kind];
  const layout = Q3_POOL_LAYOUTS[candidate.kind] || null;
  const outer = document.createElement('div');
  outer.className = 'q3-visual q3-visual-stage';
  outer.style.width = contentBox.width + 'px';
  outer.style.height = contentBox.height + 'px';

  if (!spec) return outer;

  const boardWidth = layout ? (layout.width || 120) : 112;
  const boardHeight = layout ? (layout.height || 56) : 88;
  const chroms = layout ? (layout.chroms || []) : (spec.chroms || []);
  const scale = Math.min(contentBox.width / boardWidth, contentBox.height / boardHeight);

  const artboard = document.createElement('div');
  artboard.className = 'q3-visual-artboard';
  artboard.style.width = boardWidth + 'px';
  artboard.style.height = boardHeight + 'px';
  artboard.style.position = 'absolute';
  artboard.style.left = '50%';
  artboard.style.top = '50%';
  artboard.style.transformOrigin = 'center center';
  artboard.style.transform = `translate(-50%, -50%) scale(${scale})`;

  chroms.forEach(item => artboard.appendChild(q3CreateDiagramChromosome(item, 'pool')));
  outer.appendChild(artboard);
  return outer;
}

function q3FitStage() {
  const shell = document.getElementById('q3-stage-fit');
  const stage = document.getElementById('q3-stage');
  if (!(shell && stage)) return;

  const parent = shell.parentElement;
  const availableWidth = parent ? parent.clientWidth : shell.clientWidth;
  const scale = availableWidth ? Math.min(1, availableWidth / Q3_STAGE_SIZE.width) : 1;

  shell.style.height = (Q3_STAGE_SIZE.height * scale) + 'px';
  stage.style.transform = `scale(${scale})`;
}

function q3ClearDropHighlights() {

function q3CanAccept(slot, candidate) {
  return !!(slot && candidate && !q3SlotIsPreset(slot.id));
}

function q3ReturnToPool(slotId, itemId) {
  if (!slotId || q3SlotIsPreset(slotId) || !itemId) return;
  q3Placements[slotId] = q3GetSlotItems(slotId).filter(item => item.id !== itemId);
  clrFB('q3-fb');
  q3RenderPool();
  q3RenderStage();
}

function q3FreezeSlotItems(slotId, slot=null) {
  const targetSlot = slot || q3SlotById(slotId);
  const items = q3GetSlotItems(slotId);
  if (!(targetSlot && items.length)) return;

  const slotWidth = targetSlot.w || q3Dim(targetSlot.size);
  const slotHeight = targetSlot.h || q3Dim(targetSlot.size);
  const autoCenters = q3AutoCenters(items.length);
  let autoIndex = 0;

  items.forEach(item => {
    if (item.manual) return;
    const candidate = q3CandidateById(item.candidateId);
    if (!candidate) return;
    const itemDim = q3PlacedItemDim(candidate, { width:slotWidth, height:slotHeight }, items.length);
    const contentBox = q3StageContentBox(candidate, itemDim);
    const autoPos = autoCenters[autoIndex] || { x:.5, y:.5 };
    const pos = q3ResolveStageItemPos(item, { width:contentBox.width, height:contentBox.height }, { width:slotWidth, height:slotHeight }, autoPos);
    item.x = pos.x;
    item.y = pos.y;
    item.manual = true;
    autoIndex += 1;
  });
}

function q3FreezeAllStageItems() {
  Q3_STAGE_SLOTS.forEach(slot => {
    if (!q3SlotIsPreset(slot.id)) q3FreezeSlotItems(slot.id, slot);
  });
}

function q3DropCenterFromEvent(slotId, candidate, event) {
  const slot = q3SlotById(slotId);
  const slotEl = document.getElementById('q3-slot-' + slotId);
  if (!(slot && slotEl && event && Number.isFinite(event.clientX) && Number.isFinite(event.clientY))) {
    return { x:.5, y:.5 };
  }

  const currentCount = q3GetSlotItems(slotId).length + 1;
  const slotWidth = slot.w || q3Dim(slot.size);
  const slotHeight = slot.h || q3Dim(slot.size);
  const itemDim = q3PlacedItemDim(candidate, { width:slotWidth, height:slotHeight }, currentCount);
  const contentBox = q3StageContentBox(candidate, itemDim);
  const rect = slotEl.getBoundingClientRect();
  if (!rect.width || !rect.height) return { x:.5, y:.5 };

  const rawX = (event.clientX - rect.left) / rect.width;
  const rawY = (event.clientY - rect.top) / rect.height;
  const minX = contentBox.width / (slotWidth * 2);
  const maxX = 1 - minX;
  const minY = contentBox.height / (slotHeight * 2);
  const maxY = 1 - minY;
  return {
    x: q3Clamp(rawX, minX, maxX),
    y: q3Clamp(rawY, minY, maxY),
  };
}

function q3RenderStage() {
  const layer = document.getElementById('q3-stage-layer');
  if (!layer) return;
  layer.innerHTML = '';

  {
    Q3_STAGE_SLOTS.forEach(slot => {
      const dim = q3Dim(slot.size);
      const slotWidth = slot.w || dim;
      const slotHeight = slot.h || dim;
      const el = document.createElement('div');
      el.id = 'q3-slot-' + slot.id;
      el.className = 'q3-stage-slot';
      if (slot.frame === 'gourd') el.classList.add('q3-stage-slot-gourd');
      el.style.left = slot.x + 'px';
      el.style.top = slot.y + 'px';
      el.style.width = slotWidth + 'px';
      el.style.height = slotHeight + 'px';
      el.dataset.droppable = 'true';

      if (slot.frame === 'gourd') {
        el.appendChild(q3CreateGourdSlotShape());
      }

      const presetCandidateId = Q3_PRESET_PLACEMENTS[slot.id];
      if (presetCandidateId) {
        el.classList.add('filled', 'preset');
        const candidate = q3CandidateById(presetCandidateId);
        const preview = q3CreateCandidateVisual(candidate, Math.max(38, Math.min(slotWidth, slotHeight) - 4), 'stage');
        preview.style.position = 'absolute';
        preview.style.left = '50%';
        preview.style.top = '50%';
        preview.style.transform = 'translate(-50%, -50%)';
        preview.style.pointerEvents = 'none';
        preview.style.zIndex = '1';
        el.appendChild(preview);
      } else {
        const items = q3GetSlotItems(slot.id)
          .slice()
          .sort((a, b) => a.z - b.z);
        if (items.length) el.classList.add('filled');

        const autoCenters = q3AutoCenters(items.length);
        let autoIndex = 0;
        items.forEach(item => {
          const candidate = q3CandidateById(item.candidateId);
          if (!candidate) return;

          const itemDim = q3PlacedItemDim(candidate, { width:slotWidth, height:slotHeight }, items.length);
          const contentBox = q3StageContentBox(candidate, itemDim);
          const autoPos = autoCenters[autoIndex] || { x:.5, y:.5 };
          const pos = q3ResolveStageItemPos(item, { width:contentBox.width, height:contentBox.height }, { width:slotWidth, height:slotHeight }, autoPos);
          if (!item.manual) autoIndex += 1;

          const piece = document.createElement('div');
          piece.className = 'q3-stage-item';
          piece.dataset.slotId = slot.id;
          piece.dataset.itemId = item.id;
          piece.style.width = contentBox.width + 'px';
          piece.style.height = contentBox.height + 'px';
          piece.style.left = pos.left + 'px';
          piece.style.top = pos.top + 'px';
          piece.style.zIndex = item.z;

          const visual = q3CreatePlacedStageVisual(candidate, contentBox);
          visual.style.pointerEvents = 'none';
          piece.appendChild(visual);

          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.className = 'q3-stage-remove';
          removeBtn.textContent = '×';
          {
            const inset = qStageRemoveInsets(Math.max(contentBox.width, contentBox.height), contentBox);
            removeBtn.style.right = inset.right + 'px';
            removeBtn.style.top = inset.top + 'px';
          }
          removeBtn.addEventListener('pointerdown', e => e.stopPropagation());
          removeBtn.addEventListener('click', e => {
            e.preventDefault();
            e.stopPropagation();
            q3ReturnToPool(slot.id, item.id);
          });
          piece.appendChild(removeBtn);

          piece.addEventListener('pointerdown', e => q3StartMoveItem(e, slot.id, item.id, piece));
          el.appendChild(piece);
        });
      }

      el.ondragover = e => {
        if (!q3CanAccept(slot, q3CandidateById(q3DragCandidateId))) return;
        e.preventDefault();
        el.classList.add('can-drop');
      };
      el.ondragleave = () => el.classList.remove('can-drop');
      el.ondrop = e => {
        e.preventDefault();
        el.classList.remove('can-drop');
        q3HandleDrop(slot.id, e.dataTransfer.getData('text/plain'), e);
      };

      layer.appendChild(el);
    });
    return;
  }
}

function q3RenderPool() {
  const pool = document.getElementById('q3-pool');
  if (!pool) return;
  pool.innerHTML = '';

  const used = new Set(q3CollectUsedCandidateIds());
  Q3_CANDIDATES.filter(item => !used.has(item.id)).forEach(candidate => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'q3-pool-item';
    btn.draggable = true;
    btn.dataset.id = candidate.id;
    btn.appendChild(q3CreateCandidateVisual(candidate, q3PoolItemDim(candidate), 'pool'));

    btn.addEventListener('dragstart', e => {
      q3DragCandidateId = candidate.id;
      e.dataTransfer.setData('text/plain', candidate.id);
      setTimeout(() => btn.classList.add('dragging'), 0);
    });
    btn.addEventListener('dragend', () => {
      btn.classList.remove('dragging');
      q3DragCandidateId = null;
      q3ClearDropHighlights();
    });

    pool.appendChild(btn);
  });
}

function q3FlashSlotState(slotId, type) {
  const el = document.getElementById('q3-slot-' + slotId);
  if (!el) return;
  el.classList.add(type);
  setTimeout(() => el.classList.remove(type), type === 'correct' ? 650 : 450);
}

function q3HandleDrop(slotId, candidateId, event=null) {
  const slot = q3SlotById(slotId);
  const candidate = q3CandidateById(candidateId);
  if (!slot || !candidate) return;
  if (!q3CanAccept(slot, candidate)) return;

  const used = new Set(q3CollectUsedCandidateIds());
  if (used.has(candidateId)) return;

  q3FreezeAllStageItems();
  const dropPos = q3DropCenterFromEvent(slotId, candidate, event);

  q3GetSlotItems(slotId).push({
    id: 'q3-stage-item-' + q3StageNextId++,
    candidateId,
    x: dropPos.x,
    y: dropPos.y,
    manual: true,
    z: ++q3StageZCounter,
  });
  clrFB('q3-fb');
  q3RenderPool();
  q3RenderStage();
}

function q3Hint() {
  clrFB('q3-fb');

function q3Build() {
  q3FinishStageMove();
  q3Placements = q3InitialPlacements();
  q3DragCandidateId = null;
  q3StageNextId = 1;
  q3StageZCounter = 1;
  q3Built = true;

    window.addEventListener('resize', q3FitStage);
    q3ScaleBound = true;
  }
}

function q3Reset() {
  q3FinishStageMove();

  q3DragCandidateId = null;
  q3StageNextId = 1;
  q3StageZCounter = 1;

}

function q4ChrBarSVG(item, size) {
  const isLong = item.size === 'long';
  const h = size==='xs' ? (isLong?38:24)
          : size==='sm' ? (isLong?52:32)
          : size==='md' ? (isLong?68:42)
          : size==='lg' ? (isLong?80:50)
          :               (isLong?68:42);
  const w = size==='xs' ? 8 : size==='sm' ? 10 : 12;
  const r = size==='xs' ? 3.5 : size==='sm' ? 4 : 5;
  const fill  = item.col==='red' ? Q4_COLORS.red  : Q4_COLORS.blue;
  const stroke= item.col==='red' ? Q4_COLORS.redDark : Q4_COLORS.blueDark;
  const s = makeSVG(w, h);
  s.appendChild(svgRect(1,1,w-2,h-2,3,fill,stroke,1.5));
  s.appendChild(svgCircle(w/2,h*0.42,r,fill,stroke,1.3));
  return s;
}

function q4ChrXSVG(item, size) {
  const isLong = item.size === 'long';
  const arm = size==='xs' ? (isLong?18:12) : size==='sm' ? (isLong?26:17) : (isLong?36:22);
  const sp  = size==='xs' ? (isLong?5:4)   : size==='sm' ? (isLong?7:5)   : (isLong?9:6);
  const W = sp*2+14, H = arm*2+8;
  const cx=W/2, cy=H/2;
  const thick = size==='xs' ? (isLong?5:4) : size==='sm' ? (isLong?6:5) : (isLong?7:6);
  const fill  = item.col==='red' ? Q4_COLORS.red  : Q4_COLORS.blue;
  const stroke= item.col==='red' ? Q4_COLORS.redDark : Q4_COLORS.blueDark;
  const s = makeSVG(W, H);
  [[cx,cy,cx-sp,cy-arm],[cx,cy,cx+sp,cy-arm],[cx,cy,cx-sp,cy+arm],[cx,cy,cx+sp,cy+arm]]
    .forEach(([x1,y1,x2,y2])=>{
      s.appendChild(svgLine(x1,y1,x2,y2,thick+2,stroke));
      s.appendChild(svgLine(x1,y1,x2,y2,thick,fill));
    });
  s.appendChild(svgCircle(cx,cy,size==='xs'?3:(isLong?5:4),fill,stroke,1.3));
  return s;
}

function q4FreezeSlotItems(slotId, slot=null) {
  const targetSlot = slot || q4SlotById(slotId);
  const items = q4GetSlotItems(slotId);
  if (!(targetSlot && items.length)) return;

  const slotWidth = targetSlot.w || q4FlowDim(targetSlot.size);
  const slotHeight = targetSlot.h || q4FlowDim(targetSlot.size);
  const autoCenters = q3AutoCenters(items.length);
  let autoIndex = 0;

  items.forEach(item => {
    if (item.manual) return;
    const candidate = q4CandidateById(item.candidateId);
    if (!candidate) return;
    const itemDim = q4PlacedItemDim(candidate, { width:slotWidth, height:slotHeight }, items.length);
    const autoPos = autoCenters[autoIndex] || { x:.5, y:.5 };
    const pos = q3ResolveStageItemPos(item, itemDim, { width:slotWidth, height:slotHeight }, autoPos);
    item.x = pos.x;
    item.y = pos.y;
    item.manual = true;
    autoIndex += 1;
  });
}

function q4DropCenterFromEvent(slotId, candidate, event) {
  const slot = q4SlotById(slotId);
  const slotEl = document.getElementById('q4-slot-' + slotId);
  if (!(slot && slotEl && event && Number.isFinite(event.clientX) && Number.isFinite(event.clientY))) {
    return { x:.5, y:.5 };
  }

  const currentCount = q4GetSlotItems(slotId).length + 1;
  const slotWidth = slot.w || q4FlowDim(slot.size);
  const slotHeight = slot.h || q4FlowDim(slot.size);
  const itemDim = q4PlacedItemDim(candidate, { width:slotWidth, height:slotHeight }, currentCount);
  const rect = slotEl.getBoundingClientRect();
  if (!rect.width || !rect.height) return { x:.5, y:.5 };

  const rawX = (event.clientX - rect.left) / rect.width;
  const rawY = (event.clientY - rect.top) / rect.height;
  const minX = itemDim / (slotWidth * 2);
  const maxX = 1 - minX;
  const minY = itemDim / (slotHeight * 2);
  const maxY = 1 - minY;
  return {
    x: q3Clamp(rawX, minX, maxX),
    y: q3Clamp(rawY, minY, maxY),
  };
}

function q4FlowAnaphaseSVG(variant='large', col='red', mode='double', direction='down') {
  const isLarge = variant === 'large';
  const isDown = direction === 'down';
  const width = isLarge ? 54 : 36;
  const height = isLarge ? 54 : 36;
  const cx = width / 2;
  const cy = height / 2;
  const fill = col === 'red' ? Q4_COLORS.red : Q4_COLORS.blue;
  const stroke = col === 'red' ? Q4_COLORS.redDark : Q4_COLORS.blueDark;
  const thickOuter = isLarge ? 8.2 : 6.2;
  const thickInner = isLarge ? 6.0 : 4.4;
  const spanX = isLarge ? 17 : 12;
  const spanY = isLarge ? 15 : 10;
  const svg = makeSVG(width, height);

  const lines = mode === 'double'
    ? [
        [cx, cy, cx - spanX, cy - spanY],
        [cx, cy, cx + spanX, cy - spanY],
        [cx, cy, cx - spanX, cy + spanY],
        [cx, cy, cx + spanX, cy + spanY],
      ]
    : isDown
      ? [
          [cx, cy - 6, cx - spanX, cy + spanY],
          [cx, cy - 6, cx + spanX, cy + spanY],
        ]
      : [
          [cx, cy + 6, cx - spanX, cy - spanY],
          [cx, cy + 6, cx + spanX, cy - spanY],
        ];

  lines.forEach(([x1, y1, x2, y2]) => {
    svg.appendChild(svgLine(x1, y1, x2, y2, thickOuter, stroke));
    svg.appendChild(svgLine(x1, y1, x2, y2, thickInner, fill));
  });

  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('cx', String(cx));
  dot.setAttribute('cy', String(mode === 'double' ? cy : (isDown ? cy - 6 : cy + 6)));
  dot.setAttribute('r', isLarge ? '4.5' : '3.4');
  dot.setAttribute('fill', fill);
  dot.setAttribute('stroke', stroke);
  dot.setAttribute('stroke-width', isLarge ? '1.2' : '1');
  svg.appendChild(dot);

  return svg;
}

function q4PoolDisplayScale() {
  const vw = q3ViewportWidth();
  if (vw <= 480) return 0.58;
  if (vw <= 768) return 0.68;
  if (vw <= 1024) return 0.82;
  return 1;
}

function q4TouchDragScale() {
  const vw = q3ViewportWidth();
  if (vw <= 480) return 0.34;
  if (vw <= 768) return 0.42;
  if (vw <= 1024) return 0.56;
  return 1;
}

function q4StageViewportScale() {
  const vw = q3ViewportWidth();
  if (vw <= 480) return 0.92;
  if (vw <= 768) return 0.96;
  if (vw <= 1024) return 0.99;
  return 1;
}

function q4PoolItemDim(candidate) {
  return Math.max(28, Math.round(candidate.poolDim * q4PoolDisplayScale()));
}

function q4StageScaleFactor(count) {
  if (count <= 1) return 0.82;
  if (count === 2) return 0.74;
  if (count <= 4) return 0.68;
  if (count <= 6) return 0.50;
  return 0.40;
}

function q4PlacedItemDim(candidate, slotDim, count) {
  const slotBase = typeof slotDim === 'number'
    ? slotDim
    : Math.min(slotDim.width || slotDim.w || 74, slotDim.height || slotDim.h || 74);
  const deviceScale = q4StageViewportScale();
  const maxDim = Math.round(
    slotBase * (count <= 1 ? 0.90 : count === 2 ? 0.82 : count <= 4 ? 0.72 : 0.58) * deviceScale
  );
  const scaled = Math.round(candidate.poolDim * q4StageScaleFactor(count) * deviceScale);
  return Math.max(16, Math.min(maxDim, scaled));
}

function q4CandidateNaturalBox(item) {
  if (!item) return { width: 60, height: 60 };

  if (item.shape === 'cross') {
    const width = item.variant === 'large' ? 98 : 74;
    const height = item.variant === 'large' ? 54 : 40;
    return item.rot === 90 ? { width: height, height: width } : { width, height };
  }

  if (item.shape === 'open-double') {
    return item.variant === 'large'
      ? { width: 92, height: 56 }
      : { width: 58, height: 38 };
  }

  return { width: item.poolDim || 72, height: item.poolDim || 72 };
}

function q4StageContentBox(candidate, dim) {
  const natural = q4CandidateNaturalBox(candidate);
  const available = Math.max(16, dim - 4);
  const scale = Math.min(available / natural.width, available / natural.height);
  return {
    width: Math.max(12, Math.round(natural.width * scale)),
    height: Math.max(12, Math.round(natural.height * scale)),
  };
}

function q4CandidateSvg(item) {
  if (item.shape === 'cross') {
    return q3PoolChromSVG(item.variant || 'small', item.col);
  }
  if (item.shape === 'open-double') {
    return q4PoolOpenDoubleSVG(item.variant || 'small', item.col, item.direction || 'down');
  }
  if (item.shape === 'flat') {
    return q3FlatPairSVG({ size:item.size, col:item.col }, 'pool');
  }
  if (item.shape === 'bar') {
    return q4ChrBarSVG({ size:item.size, col:item.col }, 'sm');
  }
  return q3PoolOpenChromSVG(
    item.variant || (item.size === 'long' ? 'large' : 'small'),
    item.col,
    item.direction || 'up'
  );
}

function q4CreateCandidateVisual(candidate, dim, mode='pool') {
  const natural = q4CandidateNaturalBox(candidate);
  const available = mode === 'stage' ? Math.max(16, dim - 4) : dim;
  const scale = Math.min(available / natural.width, available / natural.height);
  const boxWidth = mode === 'stage' ? dim : Math.max(18, Math.round(natural.width * scale));
  const boxHeight = mode === 'stage' ? dim : Math.max(18, Math.round(natural.height * scale));

  const outer = document.createElement('div');
  outer.className = 'q3-visual q3-visual-' + mode;
  outer.style.width = boxWidth + 'px';
  outer.style.height = boxHeight + 'px';

  artboard.className = 'q3-visual-artboard';
  artboard.style.width = boxWidth + 'px';
  artboard.style.height = boxHeight + 'px';
  artboard.style.transform = 'none';

  const holder = document.createElement('div');
  holder.className = 'q3-visual-chr';
  holder.style.left = '50%';
  holder.style.top = '50%';
  holder.style.transform = `translate(-50%, -50%) rotate(${candidate.rot || 0}deg) scale(${scale})`;

  const svg = q4CandidateSvg(candidate);
  svg.style.display = 'block';
  holder.appendChild(svg);
  artboard.appendChild(holder);
  outer.appendChild(artboard);
  return outer;
}

function q4RenderPool() {
  const pool = document.getElementById('q4-pool');
  if (!pool) return;
  pool.innerHTML = '';

  const used = new Set(q4CollectUsedCandidateIds());
  Q4_POOL_ITEMS.filter(item => !used.has(item.id)).forEach(candidate => {
    const dim = q4PoolItemDim(candidate);
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'q4-pool-item';
    btn.draggable = true;
    btn.dataset.id = candidate.id;
    btn.appendChild(q4CreateCandidateVisual(candidate, dim, 'pool'));

    if (candidate.shape === 'cross' && !candidate.rot) {
      const vw = q3ViewportWidth();
      const extra = vw <= 480 ? 18 : vw <= 768 ? 14 : 8;
      btn.style.width = (dim + extra) + 'px';
    }

    btn.addEventListener('dragstart', e => {
      q4DragCandidateId = candidate.id;
      e.dataTransfer.setData('text/plain', candidate.id);
      setTimeout(() => btn.classList.add('dragging'), 0);
    });
    btn.addEventListener('dragend', () => {
      btn.classList.remove('dragging');
      q4DragCandidateId = null;
      q4ClearDropHighlights();
    });

    pool.appendChild(btn);
  });
}

function q4FlowRenderStage() {
  const layer = document.getElementById('q4-stage-layer');
  if (!layer) return;
  layer.innerHTML = '';

  Q4_FLOW_SLOTS.forEach(slot => {
    const dim = q4FlowDim(slot.size);
    const slotWidth = slot.w || dim;
    const slotHeight = slot.h || dim;
    const el = document.createElement('div');
    el.id = 'q4-slot-' + slot.id;
    el.className = 'q3-stage-slot';
    if (slot.frame === 'gourd') el.classList.add('q3-stage-slot-gourd');
    el.style.width = slotWidth + 'px';
    el.style.height = slotHeight + 'px';
    el.style.left = slot.x + 'px';
    el.style.top = slot.y + 'px';
    el.dataset.droppable = 'true';

    if (slot.frame === 'gourd') {
      el.appendChild(q3CreateGourdSlotShape());
    }

    if (slot.preset) {
      el.classList.add('filled', 'preset');
      const preview = q4FlowCreateVisual(slot.preset, Math.max(38, Math.min(slotWidth, slotHeight) - 4));
      preview.style.position = 'absolute';
      preview.style.left = '50%';
      preview.style.top = '50%';
      preview.style.transform = 'translate(-50%, -50%)';
      preview.style.pointerEvents = 'none';
      preview.style.zIndex = '1';
      el.appendChild(preview);
    } else {
      const items = q4GetSlotItems(slot.id)
        .slice()
        .sort((a, b) => a.z - b.z);
      if (items.length) el.classList.add('filled');

      const autoCenters = q3AutoCenters(items.length);
      let autoIndex = 0;
      items.forEach(item => {
        const candidate = q4CandidateById(item.candidateId);
        if (!candidate) return;

        const itemDim = q4PlacedItemDim(candidate, { width:slotWidth, height:slotHeight }, items.length);
        const autoPos = autoCenters[autoIndex] || { x:.5, y:.5 };
        const pos = q3ResolveStageItemPos(item, itemDim, { width:slotWidth, height:slotHeight }, autoPos);
        if (!item.manual) autoIndex += 1;

        const piece = document.createElement('div');
        piece.className = 'q3-stage-item';
        piece.dataset.slotId = slot.id;
        piece.dataset.itemId = item.id;
        piece.style.width = itemDim + 'px';
        piece.style.height = itemDim + 'px';
        piece.style.left = pos.left + 'px';
        piece.style.top = pos.top + 'px';
        piece.style.zIndex = item.z;

        const visual = q4CreateCandidateVisual(candidate, itemDim, 'stage');
        visual.style.pointerEvents = 'none';
        piece.appendChild(visual);

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'q3-stage-remove';
        removeBtn.textContent = '×';
        {
          const inset = qStageRemoveInsets(itemDim, q4StageContentBox(candidate, itemDim));
          removeBtn.style.right = inset.right + 'px';
          removeBtn.style.top = inset.top + 'px';
        }
        removeBtn.addEventListener('pointerdown', e => e.stopPropagation());
        removeBtn.addEventListener('click', e => {
          e.preventDefault();
          e.stopPropagation();
          q4ReturnToPool(slot.id, item.id);
        });
        piece.appendChild(removeBtn);

        piece.addEventListener('pointerdown', e => q4StartMoveItem(e, slot.id, item.id, piece));
        el.appendChild(piece);
      });
    }

    el.ondragover = e => {
      if (!q4CanAccept(slot, q4CandidateById(q4DragCandidateId))) return;
      e.preventDefault();
      el.classList.add('can-drop');
    };
    el.ondragleave = () => el.classList.remove('can-drop');
    el.ondrop = e => {
      e.preventDefault();
      el.classList.remove('can-drop');
      q4HandleDrop(slot.id, e.dataTransfer.getData('text/plain'), e);
    };

    layer.appendChild(el);
  });
}

function q4FlowFitStage() {
  const shell = document.getElementById('q4-stage-fit');
  const stage = document.getElementById('q4-stage');
  if (!(shell && stage)) return;

  const parent = shell.parentElement;
  const availableWidth = parent ? parent.clientWidth : shell.clientWidth;
  const scale = availableWidth ? Math.min(1, availableWidth / Q4_FLOW_STAGE_SIZE.width) : 1;

  shell.style.height = (Q4_FLOW_STAGE_SIZE.height * scale) + 'px';
  stage.style.transform = `scale(${scale})`;
}

function q4HandleDrop(slotId, candidateId, event=null) {
  const slot = q4SlotById(slotId);
  const candidate = q4CandidateById(candidateId);
  if (!slot || !candidate) return;
  if (!q4CanAccept(slot, candidate)) return;

  const used = new Set(q4CollectUsedCandidateIds());
  if (used.has(candidateId)) return;

  q4FreezeSlotItems(slotId, slot);
  const dropPos = q4DropCenterFromEvent(slotId, candidate, event);

  q4GetSlotItems(slotId).push({
    id: 'q4-stage-item-' + q4StageNextId++,
    candidateId,
    x: dropPos.x,
    y: dropPos.y,
    manual: true,
    z: ++q4StageZCounter,
  });
  q4RenderPool();
  q4FlowRenderStage();
}

function q4FinishStageMove() {
  q4StageDragState = null;
  document.removeEventListener('pointermove', q4HandleStagePointerMove);
  document.removeEventListener('pointerup', q4HandleStagePointerUp);
  document.removeEventListener('pointercancel', q4HandleStagePointerUp);
}

function q4StartMoveItem(e, slotId, itemId, el) {
  if (e.button !== undefined && e.button !== 0) return;
  e.preventDefault();
  if (q4StageDragState) q4FinishStageMove();

  const slotEl = document.getElementById('q4-slot-' + slotId);
  const item = q4FindStageItem(slotId, itemId);
  if (!(slotEl && item)) return;

  const rect = el.getBoundingClientRect();
  item.z = ++q4StageZCounter;
  item.manual = true;
  el.style.zIndex = item.z;

  q4StageDragState = {
    slotId,
    itemId,
    el,
    width: rect.width,
    height: rect.height,
    offsetX: e.clientX - rect.left,
    offsetY: e.clientY - rect.top,
  };

  document.addEventListener('pointermove', q4HandleStagePointerMove);
  document.addEventListener('pointerup', q4HandleStagePointerUp);
  document.addEventListener('pointercancel', q4HandleStagePointerUp);
}

function q4HandleStagePointerMove(e) {
  if (!q4StageDragState) return;

  const { slotId, itemId, el, width, height, offsetX, offsetY } = q4StageDragState;
  const slotEl = document.getElementById('q4-slot-' + slotId);
  const slot = q4SlotById(slotId);
  const item = q4FindStageItem(slotId, itemId);
  if (!(slotEl && slot && item)) return;

  const slotRect = slotEl.getBoundingClientRect();
  const slotWidth = slot.w || q4FlowDim(slot.size);
  const slotHeight = slot.h || q4FlowDim(slot.size);
  const maxLeftPx = Math.max(0, slotRect.width - width);
  const maxTopPx = Math.max(0, slotRect.height - height);
  const leftPx = q3Clamp(e.clientX - slotRect.left - offsetX, 0, maxLeftPx);
  const topPx = q3Clamp(e.clientY - slotRect.top - offsetY, 0, maxTopPx);
  const scaleX = slotRect.width ? slotWidth / slotRect.width : 1;
  const scaleY = slotRect.height ? slotHeight / slotRect.height : 1;

  el.style.left = (leftPx * scaleX) + 'px';
  el.style.top = (topPx * scaleY) + 'px';

  item.x = q3Clamp((leftPx + width / 2) / slotRect.width, 0, 1);
  item.y = q3Clamp((topPx + height / 2) / slotRect.height, 0, 1);
}

function q4HandleStagePointerUp() {
  q4FinishStageMove();
}

function q4FlowBuild() {
  q4FinishStageMove();
  q4Placements = q4InitialPlacements();
  q4DragCandidateId = null;
  q4StageNextId = 1;
  q4StageZCounter = 1;
  q4FlowBuilt = true;
  q4FlowRenderAnnotations();
  q4FlowRenderArrows();
  q4FlowRenderStage();
  q4RenderPool();
  q4FlowFitStage();

  if (!q4FlowScaleBound) {
    window.addEventListener('resize', q4FlowFitStage);
    q4FlowScaleBound = true;
  }
}

function q4FlowReset() {
  if (!q4FlowBuilt) return;
  q4FlowBuild();
}

// 鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺?// INIT

// 鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺愨晲鈺?// TOUCH SUPPORT 鈥?makes drag-and-drop work on tablets (iOS/Android)
// Translates touchstart/touchmove/touchend into dragstart/dragover/drop
(function() {
  let dragEl = null;       // the element being dragged
  let dragId = null;       // data being transferred
  let ghost  = null;       // visual clone following finger
  let lastTarget = null;   // last element under finger
  let dragMode = 'ghost';  // ghost | direct
  let dragOffsetX = 0;
  let dragOffsetY = 0;
  let dragPlaceholder = null;
  let dragInlineStyle = null;
  let pendingTouch = null;
  let pendingTimer = null;
  const Q3_HOLD_MS = 180;
  const Q3_MOVE_TOLERANCE = 10;

  function isQ3PoolDrag(el) {
    return !!(el && el.classList && el.classList.contains('q3-pool-item'));
  }

  function isQ2PoolDrag(el) {
    return !!(el && el.classList && el.classList.contains('q2-pool-item'));
  }

  function isQ4PoolDrag(el) {
    return !!(el && el.classList && el.classList.contains('q4-pool-item'));
  }

  function isPrepPoolDrag(el) {
    return !!(el && el.classList && el.classList.contains('prep-pool-item'));
  }

  function activeTouchVisual() {
    return dragMode === 'direct' ? dragEl : ghost;
  }

  function getElAtPoint(x, y) {
    const visual = activeTouchVisual();
    if (visual) visual.style.display = 'none';
    const el = document.elementFromPoint(x, y);
    if (visual) visual.style.display = '';
    return el;
  }

  function findDropTarget(el) {
    // Walk up DOM to find an element with ondrop handler
    while (el && el !== document.body) {
      if (el.ondrop || el.getAttribute('data-droppable')) return el;
      el = el.parentElement;
    }
    return null;
  }

  function findDraggable(el) {
    while (el && el !== document.body) {
      if (el.draggable) return el;
      el = el.parentElement;
    }
    return null;
  }

    const rect = el.getBoundingClientRect();
    ghost = el.cloneNode(true);
    ghost.style.cssText = `
      position: fixed;
      left: ${rect.left}px;
      top: ${rect.top}px;
      width: ${rect.width}px;
      height: ${rect.height}px;
      opacity: 0.75;
      pointer-events: none;
      z-index: 9999;
      transform: scale(1.1);
      transition: none;
      background: #e0f2fe;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);

      pendingTimer = null;
    }

    cancelPendingQ3Drag();
    pendingTouch = {
      el,
      id: el.dataset.id || null,
      startX: touch.clientX,
      startY: touch.clientY,
      currentX: touch.clientX,
      currentY: touch.clientY,
    };

      pendingTouch = null;
      return false;
    }

      dragEl = pendingTouch.el;
      dragId = pendingTouch.id;

        clientX: pendingTouch.currentX,
        clientY: pendingTouch.currentY,

      }

      }

      pendingTimer = null;

      left: el.style.left,
      top: el.style.top,
      width: el.style.width,
      height: el.style.height,
      zIndex: el.style.zIndex,
      pointerEvents: el.style.pointerEvents,
      margin: el.style.margin,
      transition: el.style.transition,
      transform: el.style.transform,
      boxShadow: el.style.boxShadow,
    };

    dragPlaceholder = document.createElement('div');
    dragPlaceholder.style.width = rect.width + 'px';
    dragPlaceholder.style.height = rect.height + 'px';
    dragPlaceholder.style.display = computed.display === 'inline' ? 'inline-block' : computed.display;
    dragPlaceholder.style.visibility = 'hidden';
    dragPlaceholder.style.pointerEvents = 'none';

    if (el.parentNode) {
      el.parentNode.insertBefore(dragPlaceholder, el);
    }

    el.style.position = 'fixed';
    el.style.left = rect.left + 'px';
    el.style.top = rect.top + 'px';
    el.style.width = rect.width + 'px';
    el.style.height = rect.height + 'px';
    el.style.zIndex = '9999';
    el.style.pointerEvents = 'none';
    el.style.margin = '0';
    el.style.transition = 'none';
    el.style.transform = 'none';

      const rect = ghost.getBoundingClientRect();
      ghost.style.left = (touch.clientX - rect.width / 2) + 'px';
      ghost.style.top  = (touch.clientY - rect.height / 2) + 'px';

        dragEl.style.height = dragInlineStyle.height;

    }
    if (typeof q4DragCandidateId !== 'undefined') {
      q4DragCandidateId = null;
    }
    if (typeof qPrepDragCandidateId !== 'undefined') {
      qPrepDragCandidateId = null;
    }
    if (typeof q2ClearDropHighlights === 'function') {
      q2ClearDropHighlights();
    }
    if (typeof q3ClearDropHighlights === 'function') {
      q3ClearDropHighlights();
    }
    if (typeof q4ClearDropHighlights === 'function') {
      q4ClearDropHighlights();
    }
    if (typeof qPrepClearDropHighlights === 'function') {
      qPrepClearDropHighlights();
    }

    dragId = null;
    lastTarget = null;

    const elUnder = getElAtPoint(touch.clientX, touch.clientY);

        lastTarget.ondragleave();
      } else {
        lastTarget.classList.remove('drop-active');

    }
    if (dropTarget) {
      if (dropTarget.ondragover) {
        dropTarget.ondragover({
          preventDefault: () => {},
          dataTransfer: { getData: () => dragId }
        });
      } else {

      }

    const touch = e.touches[0];
    if (!touch) return;
    const el = findDraggable(document.elementFromPoint(touch.clientX, touch.clientY));

        touch.clientY - pendingTouch.startY

    moveTouchVisual(touch);
    updateTouchDropTarget(touch);
  }, { passive: false });

  function finishTouchDrag(e) {
    if (pendingTouch && !dragEl) {
      cancelPendingQ3Drag();
      return;
    }
    if (!dragEl || !dragId) return;

    const touch = e.changedTouches[0];
    const elUnder = getElAtPoint(touch.clientX, touch.clientY);
    const dropTarget = findDropTarget(elUnder);
    const didDrop = !!(dropTarget && dropTarget.ondrop);

    // Fire synthetic drop
    if (didDrop) {
      const syntheticEvent = {
        preventDefault: () => {},
        dataTransfer: { getData: (type) => dragId },
        clientX: touch.clientX,
        clientY: touch.clientY,
      };
      dropTarget.ondrop(syntheticEvent);
    }

    clearTouchDragState(!didDrop);
  }

  document.addEventListener('touchend', finishTouchDrag, { passive: false });
  document.addEventListener('touchcancel', finishTouchDrag, { passive: false });
})();


</script>
</body>
